  <script>
    'use strict';

    // ─── JUCE NATIVE FUNCTIONS ──────────────────────────────────────────────
    const isJUCE = typeof window.__JUCE__ !== 'undefined';
    let juceGetPluginList, juceLoadPlugin, juceUnloadPlugin, juceOpenPluginEditor,
        juceScanPlugins, juceGetSlotStatus, juceSetEditorSize,
        juceListPresets, juceSavePreset, juceLoadPreset, juceDeletePreset,
        juceResetToDefaults, juceSaveAsDefaults,
        juceGetScanProgress, juceLoadPluginByPath, juceClearBlacklist,
        juceGetSpectrum, juceShufflePlugins, juceGetHostBpm,
        juceMoveSlot, juceDuplicateSlot,
        juceUndo, juceRedo, juceGetUndoState, juceBeginUndoTransaction,
        juceTriggerChaos, juceGetCrossoverMode, juceSetCrossoverMode;

    function initJuceFns() {
      if (!window.J || !window.J.getNativeFunction) return false;
      try {
        const gf = window.J.getNativeFunction;
        juceGetPluginList = gf('getPluginList');
        juceLoadPlugin = gf('loadPlugin');
        juceUnloadPlugin = gf('unloadPlugin');
        juceOpenPluginEditor = gf('openPluginEditor');
        juceScanPlugins = gf('scanPlugins');
        juceGetSlotStatus = gf('getSlotStatus');
        juceSetEditorSize = gf('setEditorSize');
        juceListPresets = gf('listPresets');
        juceSavePreset = gf('savePreset');
        juceLoadPreset = gf('loadPreset');
        juceDeletePreset = gf('deletePreset');
        juceResetToDefaults = gf('resetToDefaults');
        juceSaveAsDefaults = gf('saveCurrentAsDefaults');
        juceGetScanProgress = gf('getScanProgress');
        juceLoadPluginByPath = gf('loadPluginByPath');
        juceClearBlacklist = gf('clearBlacklist');
        juceGetSpectrum = gf('getSpectrum');
        juceShufflePlugins = gf('shufflePlugins');
        juceGetHostBpm = gf('getHostBpm');
        juceMoveSlot = gf('moveSlot');
        juceDuplicateSlot = gf('duplicateSlot');
        juceUndo = gf('undo');
        juceRedo = gf('redo');
        juceGetUndoState = gf('getUndoState');
        juceBeginUndoTransaction = gf('beginUndoTransaction');
        juceTriggerChaos = gf('triggerChaos');
        juceGetCrossoverMode = gf('getCrossoverMode');
        juceSetCrossoverMode = gf('setCrossoverMode');
        return true;
      } catch (e) { console.error('JUCE init failed:', e); return false; }
    }
    if (!initJuceFns()) window.addEventListener('juce-ready', initJuceFns);

    // ─── BAND BUILDING ───────────────────────────────────────────────────────
    const BANDS = ['low', 'mid', 'high'];
    const BAND_COLORS = { low: '#3ab8d4', mid: '#5fc88a', high: '#d6884a' };
    const BAND_LABELS = { low: 'LOW', mid: 'MID', high: 'HIGH' };
    const SLOTS = 5;
    const DEMO_PLUGINS = ['Pro-C 2','Pro-Q 3','Saturn 2','Valhalla Room','Decapitator','SSL G-Bus','Ozone EQ','LA-2A','CLA-76','Gullfoss','Soothe2','Pro-L 2'];
    var demoIdx = 0;
    const SLOT_KNOB = 24;

    function buildBands() {
      const container = document.getElementById('bands-container');
      BANDS.forEach(band => {
        const col = document.createElement('div');
        col.className = 'band-column';
        col.dataset.band = band;
        col.id = 'band-' + band + '-col';
        const bp = 'band_' + band + '_';
        col.innerHTML = `
          <div class="band-strip">
            <div class="band-strip-row">
              <span class="band-label" data-band="${band}">${BAND_LABELS[band]}</span>
              <span class="band-freq" id="${band}-freq-range"></span>
            </div>
            <div class="band-strip-row centered">
              <div id="cv_${bp}ms_morph" class="cv-knob-slot"></div>
              <div id="cv_${bp}dry_wet" class="cv-knob-slot"></div>
              <div id="cv_${bp}output_gain" class="cv-knob-slot"></div>
            </div>
            <div class="band-strip-row centered" style="gap:4px;">
              <button class="band-btn" data-param-id="${bp}solo" data-toggle="true" data-action="solo" onclick="toggleBandBtn(this,'solo')">S</button>
              <button class="band-btn" data-param-id="${bp}mute" data-toggle="true" data-action="mute" onclick="toggleBandBtn(this,'mute')">M</button>
              <button class="band-btn" data-param-id="${bp}bypass" data-toggle="true" data-action="bypass" onclick="toggleBandBtn(this,'bypass')">B</button>
            </div>
          </div>
        `;
        for (let s = 1; s <= SLOTS; s++) {
          const slot = document.createElement('div');
          slot.className = 'slot-card empty';
          slot.dataset.band = band;
          slot.dataset.slot = s;
          slot.onclick = function() { loadPlugin(this); };

          // Make slot draggable. Source coord encoded in dataTransfer.
          // Alt/Option held on drop = DUPLICATE (clone + state). Otherwise MOVE.
          slot.draggable = true;
          slot.addEventListener('dragstart', function(e) {
            // Abort HTML5 drag if user clicked on knob / button / canvas inside slot.
            // Knob has own ns-resize drag handler; HTML5 drag would hijack mousemove.
            const interactive = e.target.closest('.knob, .slot-btn, .slot-delete-btn, button, canvas, .slot-knob-stack');
            if (interactive) { e.preventDefault(); return; }
            if (slot.classList.contains('empty')) { e.preventDefault(); return; }
            const b = BANDS.indexOf(slot.dataset.band);
            const s = parseInt(slot.dataset.slot) - 1;
            try { e.dataTransfer.setData('application/x-mb-slot', JSON.stringify({ b, s })); } catch (err) {}
            e.dataTransfer.effectAllowed = 'copyMove';
            slot.classList.add('dragging');
          });
          slot.addEventListener('dragend', function() {
            slot.classList.remove('dragging');
          });

          slot.addEventListener('dragover', function(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = e.altKey ? 'copy' : 'move';
            slot.classList.add('drag-over');
            slot.classList.toggle('drag-over-alt', e.altKey);
          });
          slot.addEventListener('dragleave', function() {
            slot.classList.remove('drag-over');
            slot.classList.remove('drag-over-alt');
          });
          slot.addEventListener('drop', function(e) {
            e.preventDefault();
            slot.classList.remove('drag-over');
            slot.classList.remove('drag-over-alt');
            const db = BANDS.indexOf(slot.dataset.band);
            const ds = parseInt(slot.dataset.slot) - 1;

            // 1. Slot-to-slot drag
            let payload = null;
            try { payload = e.dataTransfer.getData('application/x-mb-slot'); } catch (err) {}
            if (payload) {
              const src = JSON.parse(payload);
              if (src.b === db && src.s === ds) return;       // dropped on self
              if (e.altKey) {
                if (juceDuplicateSlot) juceDuplicateSlot(src.b, src.s, db, ds);
              } else {
                if (juceMoveSlot) juceMoveSlot(src.b, src.s, db, ds);
              }
              return;
            }

            // 2. File-drop (load plugin from finder)
            const files = e.dataTransfer.files;
            if (files && files.length > 0 && juceLoadPluginByPath) {
              const path = files[0].path || files[0].name;
              juceLoadPluginByPath(db, ds, path);
            }
          });
          const sp = bp + 'slot_' + s + '_';
          slot.innerHTML = `
            <div class="slot-color-bar"></div>
            <div class="slot-number">${s}</div>
            <div class="slot-info"><span class="slot-plugin-name">Empty — Click to load</span></div>
            <div class="slot-controls">
              <div class="slot-knob-stack">
                <div class="knob" data-value="1.0" data-band="${band}" data-type="pct" data-param-id="${sp}dry_wet" style="width:${SLOT_KNOB}px;height:${SLOT_KNOB}px">
                  <canvas width="${(SLOT_KNOB+12)*2}" height="${(SLOT_KNOB+12)*2}"></canvas>
                  <div class="knob-face"></div>
                  <div class="knob-indicator"></div>
                </div>
                <span class="slot-knob-pct">100%</span>
              </div>
              <button class="slot-btn" data-param-id="${sp}bypass" data-toggle="true" data-action="bypass" onclick="event.stopPropagation();toggleSlotBypass(this)">B</button>
              <button class="slot-delete-btn" title="Remove plugin" onclick="event.stopPropagation();unloadSlot(this)" style="display:none">×</button>
            </div>
          `;
          col.appendChild(slot);
        }
        container.appendChild(col);
      });
    }

    // Map band → accent color for CVKnob.
    window.CVKnobConfig = {
      tooltipsEnabled: false,
      sectionColors: {
        low:  '#3ab8d4',
        mid:  '#5fc88a',
        high: '#d6884a'
      }
    };

    // Build all band-strip knobs using cv-knob library. Requires window.J ready.
    function buildBandCVKnobs() {
      if (!window.J || !window.J.getSliderState || !window.CVKnob) return false;
      BANDS.forEach(band => {
        const bp = 'band_' + band + '_';
        const mk = (suffix, label, unit, min, max, defaultNorm, format) => ({
          id: bp + suffix,
          label, unit, min, max,
          section: band,
          defaultNorm,
          state: window.J.getSliderState(bp + suffix),
          format
        });
        try {
          // Layout L→R: M/S · Dry-Wet · Output
          window.CVKnob.build('cv_' + bp + 'ms_morph',    mk('ms_morph', 'M/S', '', 0, 1, 0.5,
              (v, n) => n < 0.49 ? 'M ' + Math.round((0.5-n)*200) + '%'
                       : n > 0.51 ? 'S ' + Math.round((n-0.5)*200) + '%'
                       : 'Stereo'));
          window.CVKnob.build('cv_' + bp + 'dry_wet',     mk('dry_wet',     'D/W', '%',  0,  100, 1.0));
          window.CVKnob.build('cv_' + bp + 'output_gain', mk('output_gain', 'Out', 'dB', -24, 24, 0.5));
        } catch (e) { console.error('CVKnob build failed', e); }
      });
      return true;
    }

    // ─── KNOB RENDERING — Exact Chaosverb LED Ring style ─────────────────
    // Thin arc near canvas edge with cyan→accent gradient + 3-pass outer glow.
    // Inner dark face disc rendered via .knob-face div. Indicator dot via .knob-indicator div.
    const KNOB_CYAN = '#00d4ff';
    function lerpHex(a, b, t) {
      t = Math.max(0, Math.min(1, t));
      const ar = parseInt(a.slice(1,3),16), ag = parseInt(a.slice(3,5),16), ab = parseInt(a.slice(5,7),16);
      const br = parseInt(b.slice(1,3),16), bg = parseInt(b.slice(3,5),16), bb = parseInt(b.slice(5,7),16);
      return `rgb(${Math.round(ar+(br-ar)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;
    }

    function drawKnob(canvas, value, accentColor) {
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      // Canvas is rendered at 2× DPR pixels; CSS scales to (knob+28)px.
      // Drawing reference unit: 2 (1 CSS px → 2 canvas px).
      const cx = W / 2, cy = H / 2;
      const r  = (W / 2) - 18;          // arc radius, leaving room for glow + indicator
      const lineW = Math.max(2.0, W / 50);

      ctx.clearRect(0, 0, W, H);
      ctx.lineCap = 'round';

      const startA = (135 * Math.PI) / 180;
      const totalSweep = (270 * Math.PI) / 180;
      const endA = startA + totalSweep;

      // 1. Background track
      ctx.beginPath();
      ctx.arc(cx, cy, r, startA, endA);
      ctx.strokeStyle = '#1a1a1e';
      ctx.lineWidth = lineW;
      ctx.stroke();

      // 2. Value arc — gradient lerp cyan → accent + 3 glow passes
      if (value > 0.001) {
        const valA = startA + totalSweep * value;
        const totalAngleDeg = value * 270;
        const segments = Math.max(2, Math.round(totalAngleDeg * 0.5));

        const strokeArc = () => {
          for (let i = 0; i < segments; ++i) {
            const t0 = i / segments;
            const t1 = (i + 1) / segments;
            const segStart = startA + totalSweep * value * t0;
            const segEnd = startA + totalSweep * value * t1 + 0.012;
            const c = lerpHex(KNOB_CYAN, accentColor, (t0 + t1) * 0.5);
            ctx.beginPath();
            ctx.arc(cx, cy, r, segStart, segEnd);
            ctx.strokeStyle = c;
            ctx.lineWidth = lineW;
            ctx.lineCap = (i === 0 || i === segments - 1) ? 'round' : 'butt';
            ctx.stroke();
          }
        };

        // Pass 1: outer halo (wide blur, low alpha)
        ctx.save();
        ctx.shadowColor = accentColor;
        ctx.shadowBlur = lineW * 8;
        ctx.globalAlpha = 0.35;
        strokeArc();
        ctx.restore();

        // Pass 2: mid glow
        ctx.save();
        ctx.shadowColor = accentColor;
        ctx.shadowBlur = lineW * 4;
        ctx.globalAlpha = 0.6;
        strokeArc();
        ctx.restore();

        // Pass 3: crisp inner
        ctx.save();
        ctx.shadowColor = accentColor;
        ctx.shadowBlur = lineW * 1.5;
        ctx.globalAlpha = 1.0;
        strokeArc();
        ctx.restore();
      }
    }

    // Position .knob-indicator dot using the knob's data-value.
    function updateIndicator(knobEl) {
      const ind = knobEl.querySelector('.knob-indicator');
      if (!ind) return;
      const v = parseFloat(knobEl.dataset.value);
      const angle = (135 + v * 270) * Math.PI / 180;
      // CSS knob-body coords: center at (size/2). Dot orbits at ~36% of size (just inside face edge).
      const size = knobEl.clientWidth || parseFloat(knobEl.style.width) || 26;
      const r = size * 0.30;
      const cx = size / 2;
      const cy = size / 2;
      ind.style.left = (cx + r * Math.cos(angle)) + 'px';
      ind.style.top  = (cy + r * Math.sin(angle)) + 'px';
    }

    function updateKnobDisplay(knobEl) {
      const pctEl = knobEl.querySelector('.knob-pct');
      const val = parseFloat(knobEl.dataset.value);
      const type = knobEl.dataset.type;
      let insideText = '', belowText = '';
      if (type === 'pct') {
        insideText = Math.round(val * 100) + '%';
        belowText = insideText;
      } else if (type === 'slope') {
        const slope = Math.round(6 + val * 90);
        insideText = slope;
        belowText = slope + ' dB/oct';
      } else if (type === 'ms') {
        if (val < 0.48) {
          const mp = Math.round((1 - val / 0.5) * 100);
          insideText = 'M' + mp;
          belowText = 'Mid ' + mp + '%';
        } else if (val > 0.52) {
          const sp = Math.round(((val - 0.5) / 0.5) * 100);
          insideText = 'S' + sp;
          belowText = 'Side ' + sp + '%';
        } else {
          insideText = 'St';
          belowText = 'Stereo';
        }
      } else if (type === 'gain') {
        const db = ((val - 0.5) * 48).toFixed(1);
        belowText = (db >= 0 ? '+' : '') + db + ' dB';
      }
      if (pctEl) pctEl.textContent = insideText;
      const group = knobEl.closest('.knob-group');
      if (group) {
        const valEl = group.querySelector('.knob-value');
        if (valEl) valEl.textContent = belowText;
      }
      // Slot D/W: separate pct label below knob (more visible than tiny inside-knob text)
      const stack = knobEl.closest('.slot-knob-stack');
      if (stack) {
        const sl = stack.querySelector('.slot-knob-pct');
        if (sl) sl.textContent = insideText;
      }
    }

    function getKnobColor(knob) {
      const band = knob.dataset.band;
      const type = knob.dataset.type;
      const val = parseFloat(knob.dataset.value);
      if (type === 'ms' && Math.abs(val - 0.5) < 0.03) return '#a0a0a4';
      return band ? BAND_COLORS[band] : '#c77dff';
    }

    function initAllKnobs() {
      document.querySelectorAll('.knob').forEach(knob => {
        const canvas = knob.querySelector('canvas');
        const val = parseFloat(knob.dataset.value) || 0.5;
        drawKnob(canvas, val, getKnobColor(knob));
        updateIndicator(knob);
        updateKnobDisplay(knob);
        setupKnobDrag(knob);
      });
    }

    function setupKnobDrag(knob) {
      let startY, startVal;
      const onMove = (e) => {
        const nv = Math.max(0, Math.min(1, startVal + (startY - e.clientY) / 150));
        knob.dataset.value = nv;
        drawKnob(knob.querySelector('canvas'), nv, getKnobColor(knob));
        updateIndicator(knob);
        updateKnobDisplay(knob);
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.body.style.cursor = '';
      };
      knob.addEventListener('mousedown', (e) => {
        e.preventDefault(); e.stopPropagation();
        startY = e.clientY; startVal = parseFloat(knob.dataset.value) || 0.5;
        document.body.style.cursor = 'ns-resize';
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
      knob.addEventListener('dblclick', (e) => {
        e.stopPropagation();
        const type = knob.dataset.type;
        const def = type === 'pct' ? 1.0 : type === 'ms' ? 0.5 : type === 'slope' ? 0.2 : 0.5;
        knob.dataset.value = def;
        drawKnob(knob.querySelector('canvas'), def, getKnobColor(knob));
        updateIndicator(knob);
        updateKnobDisplay(knob);
      });
    }

    // ─── SPECTRUM ─────────────────────────────────────────────────────────────
    let spectrumCollapsed = false;
    let crossoverLowMid = 200, crossoverMidHigh = 3000;
    let slopeLowMid = 24, slopeMidHigh = 24;     // dB/oct, per-crossover
    const SLOPE_MIN = 6, SLOPE_MAX = 48;          // continuous 6..48 dB/oct, 0.1 dB resolution
    const SLOPE_STEP = 0.1;
    function snapSlope(v) { return Math.max(SLOPE_MIN, Math.min(SLOPE_MAX, Math.round(v * 10) / 10)); }
    let draggingHandle = null;
    let draggingMode = null;                     // 'freq' | 'slope' (determined after small drag delta)
    let hoverHandle = null;                      // 'lm' | 'mh' | null — pointer near crossover
    let lmRevealUntil = 0, mhRevealUntil = 0;    // ms timestamps — keep visible briefly after change
    const REVEAL_MS = 1200;
    function revealLM() { lmRevealUntil = performance.now() + REVEAL_MS; }
    function revealMH() { mhRevealUntil = performance.now() + REVEAL_MS; }

    function toggleSpectrum() {
      spectrumCollapsed = !spectrumCollapsed;
      document.getElementById('spectrum-container').classList.toggle('collapsed', spectrumCollapsed);
      document.getElementById('collapse-bar').classList.toggle('hidden', !spectrumCollapsed);
    }

    function freqToX(f, w) {
      return ((Math.log10(f) - Math.log10(20)) / (Math.log10(20000) - Math.log10(20))) * w;
    }
    function xToFreq(x, w) {
      return Math.pow(10, Math.log10(20) + (x / w) * (Math.log10(20000) - Math.log10(20)));
    }
    function fmtFreq(f) { return f >= 1000 ? (f/1000).toFixed(1)+'k' : Math.round(f)+''; }

    // Peak-hold buffers — dual layer (input + output)
    var __specInDisplay = null;
    var __specOutDisplay = null;
    var __specOutPeak = null;
    const SMOOTH_ATTACK = 0.65;
    const SMOOTH_RELEASE = 0.06;
    const PEAK_DECAY = 0.004;
    // 1/f slope tilt — visually flattens pink noise (pro analyzer convention)
    const TILT_DB_PER_OCT = 3.0;
    const REF_FREQ = 1000;

    function drawSpectrum() {
      const canvas = document.getElementById('spectrum-canvas');
      if (!canvas || spectrumCollapsed) return;
      const rect = canvas.parentElement.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      if (canvas.width !== rect.width * dpr || canvas.height !== rect.height * dpr) {
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
      }
      const ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      const w = rect.width, h = rect.height;
      ctx.clearRect(0, 0, w, h);
      const xLM = freqToX(crossoverLowMid, w), xMH = freqToX(crossoverMidHigh, w);
      const now = performance.now();
      const showLM = (draggingHandle === 'lm') || hoverHandle === 'lm' || now < lmRevealUntil;
      const showMH = (draggingHandle === 'mh') || hoverHandle === 'mh' || now < mhRevealUntil;

      // Band region tints — always visible (very subtle) so user sees zones
      ctx.fillStyle = 'rgba(58,184,212,0.05)'; ctx.fillRect(0, 0, xLM, h);
      ctx.fillStyle = 'rgba(95,200,138,0.05)'; ctx.fillRect(xLM, 0, xMH-xLM, h);
      ctx.fillStyle = 'rgba(214,136,74,0.05)'; ctx.fillRect(xMH, 0, w-xMH, h);

      // ─── Grid (dB horizontal + freq vertical) ─────────────────────────
      // dB scale: top = 0 dB, bottom = -90 dB
      ctx.strokeStyle = 'rgba(80,80,90,0.18)'; ctx.lineWidth = 0.5;
      const DB_LINES = [-12, -24, -36, -48, -60, -72, -84];
      ctx.fillStyle = 'rgba(140,140,150,0.45)'; ctx.font = '8px "JetBrains Mono", ui-monospace, monospace'; ctx.textAlign = 'left';
      DB_LINES.forEach(db => {
        const y = ((-db) / 90) * h;
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
        ctx.fillText(db + ' dB', 4, y - 2);
      });

      // Freq grid (decade + 2,5 sub) with stronger lines on decades
      const FREQ_GRID_MAJOR = [100, 1000, 10000];
      const FREQ_GRID_MINOR = [50, 200, 500, 2000, 5000];
      ctx.strokeStyle = 'rgba(80,80,90,0.10)';
      FREQ_GRID_MINOR.forEach(f => { const x=freqToX(f,w); ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h-16); ctx.stroke(); });
      ctx.strokeStyle = 'rgba(80,80,90,0.25)';
      FREQ_GRID_MAJOR.forEach(f => { const x=freqToX(f,w); ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h-16); ctx.stroke(); });

      // Freq labels (along bottom)
      ctx.fillStyle = 'rgba(140,140,150,0.6)'; ctx.font = '9px "JetBrains Mono", ui-monospace, monospace'; ctx.textAlign = 'center';
      [[20,'20'],[50,'50'],[100,'100'],[200,'200'],[500,'500'],[1000,'1k'],[2000,'2k'],[5000,'5k'],[10000,'10k'],[20000,'20k']].forEach(([f,l]) => {
        ctx.fillText(l, freqToX(f,w), h-4);
      });

      // Dual-layer spectrum: input (muted) + output (vivid).
      const rawData = window.__spectrumBins;  // { input: [...], output: [...] }
      const numPx = Math.max(64, Math.floor(w));
      if (!__specInDisplay || __specInDisplay.length !== numPx) {
        __specInDisplay  = new Float32Array(numPx);
        __specOutDisplay = new Float32Array(numPx);
        __specOutPeak    = new Float32Array(numPx);
      }

      const specFmin = (rawData && rawData.fmin) ? rawData.fmin : 20;
      const specFmax = (rawData && rawData.fmax) ? rawData.fmax : 20000;
      const specLogMin = Math.log(specFmin), specLogMax = Math.log(specFmax);

      function smoothLayer(bins, display) {
        if (!bins || bins.length === 0) return;
        const LB = bins.length;
        const raw = new Float32Array(numPx);
        for (let x = 0; x < numPx; ++x) {
          const fc = xToFreq(x + 0.5, w);
          // Map pixel freq → log-spaced bin index (bins already log-distributed)
          const t = (Math.log(Math.max(specFmin, Math.min(specFmax, fc))) - specLogMin)
                    / (specLogMax - specLogMin);
          const bIdx = t * (LB - 1);
          const i0 = Math.max(0, Math.min(LB - 1, Math.floor(bIdx)));
          const i1 = Math.max(0, Math.min(LB - 1, i0 + 1));
          const frac = bIdx - i0;
          const v = bins[i0] * (1 - frac) + bins[i1] * frac;
          let db = (v - 1.0) * 100.0;
          const octFromRef = Math.log2(Math.max(20, fc) / REF_FREQ);
          db += octFromRef * TILT_DB_PER_OCT;
          raw[x] = Math.max(0, Math.min(1, (db + 90) / 90));
        }
        // Spatial smoothing (5-tap binomial blur) — kills bin-step staircase
        const smooth = new Float32Array(numPx);
        for (let x = 0; x < numPx; ++x) {
          const a = raw[Math.max(0, x - 2)];
          const b = raw[Math.max(0, x - 1)];
          const c = raw[x];
          const d = raw[Math.min(numPx - 1, x + 1)];
          const e = raw[Math.min(numPx - 1, x + 2)];
          smooth[x] = (a + 4*b + 6*c + 4*d + e) / 16;     // binomial coefficients
        }
        // Temporal smoothing (attack/release)
        for (let x = 0; x < numPx; ++x) {
          const cur = display[x];
          const coef = smooth[x] > cur ? SMOOTH_ATTACK : SMOOTH_RELEASE;
          display[x] = cur + (smooth[x] - cur) * coef;
        }
      }

      if (rawData) {
        smoothLayer(rawData.input,  __specInDisplay);
        smoothLayer(rawData.output, __specOutDisplay);
        // Peak hold on output
        for (let x = 0; x < numPx; ++x) {
          __specOutPeak[x] = Math.max(__specOutPeak[x] - PEAK_DECAY, __specOutDisplay[x]);
        }
      }

      const pad = 4;

      function drawCurve(display, fillStyle, strokeStyle, strokeW) {
        if (!display) return;
        ctx.beginPath();
        ctx.moveTo(0, h);
        let prevY = h * (1 - display[0]) + pad;
        ctx.lineTo(0, prevY);
        for (let x = 1; x < numPx; ++x) {
          const y = h * (1 - display[x]) + pad;
          const midX = x - 0.5, midY = (prevY + y) * 0.5;
          ctx.quadraticCurveTo(x - 1, prevY, midX, midY);
          prevY = y;
        }
        ctx.lineTo(numPx - 1, prevY);
        ctx.lineTo(numPx - 1, h);
        ctx.closePath();
        if (fillStyle) { ctx.fillStyle = fillStyle; ctx.fill(); }

        if (strokeStyle) {
          ctx.beginPath();
          prevY = h * (1 - display[0]) + pad;
          ctx.moveTo(0, prevY);
          for (let x = 1; x < numPx; ++x) {
            const y = h * (1 - display[x]) + pad;
            const midX = x - 0.5, midY = (prevY + y) * 0.5;
            ctx.quadraticCurveTo(x - 1, prevY, midX, midY);
            prevY = y;
          }
          ctx.lineTo(numPx - 1, prevY);
          ctx.strokeStyle = strokeStyle;
          ctx.lineWidth = strokeW;
          ctx.stroke();
        }
      }

      // INPUT layer — outline only, dim grey (reference signal)
      drawCurve(__specInDisplay, null, 'rgba(180,180,190,0.55)', 1.0);

      // OUTPUT layer — copper-amber fill (matches Entropia accent), on top
      const outGrad = ctx.createLinearGradient(0, 0, 0, h);
      outGrad.addColorStop(0,   'rgba(212,165,116,0.55)');
      outGrad.addColorStop(0.5, 'rgba(212,165,116,0.18)');
      outGrad.addColorStop(1,   'rgba(212,165,116,0.02)');
      drawCurve(__specOutDisplay, outGrad, 'rgba(232,190,140,0.95)', 1.3);

      // OUTPUT peak hold (faint amber)
      if (__specOutPeak) {
        ctx.beginPath();
        let py = h * (1 - __specOutPeak[0]) + pad;
        ctx.moveTo(0, py);
        for (let x = 1; x < numPx; ++x) {
          py = h * (1 - __specOutPeak[x]) + pad;
          ctx.lineTo(x, py);
        }
        ctx.strokeStyle = 'rgba(232,190,140,0.35)';
        ctx.lineWidth = 0.7;
        ctx.stroke();
      }

      // ─── Per-band crossover response curves (Pro-MB style) ───────────────
      // Each band = real magnitude response of the cascaded 1st-order filters.
      // Bands overlap and cross at the crossover points (~-3..-6 dB), exactly
      // like Pro-MB. Slope (dB/oct) sets skirt steepness.
      // Floor deeper than the deepest crossover dip (-slope/2 = -24 dB @ 48 dB/oct)
      // so adjacent bands CROSS visibly (~X shape) instead of plunging to the
      // bottom. Gamma < 1 compresses gentle skirts → 6 dB/oct stays narrow.
      const VIZ_DB_RANGE = 60;
      const VIZ_GAMMA    = 0.62;
      const respTopY  = pad + 2;        // y at 0 dB
      const respBaseY = h - 20;         // y at -VIZ_DB_RANGE
      const nLM = Math.max(0.1, slopeLowMid  / 6);   // cascade order = slope/6
      const nMH = Math.max(0.1, slopeMidHigh / 6);

      function dbLP (f, fc, n) { return -n * 10 * Math.log10(1 + (f / fc) * (f / fc)); }
      function dbHP (f, fc, n) { return -n * 10 * Math.log10(1 + (fc / f) * (fc / f)); }
      function bandDb (f, which) {
        if (which === 0) return dbLP(f, crossoverLowMid, nLM);                                   // LOW
        if (which === 1) return dbHP(f, crossoverLowMid, nLM) + dbLP(f, crossoverMidHigh, nMH);  // MID
        return dbHP(f, crossoverMidHigh, nMH);                                                   // HIGH
      }
      function dbToY (db) {
        let t = Math.max(0, Math.min(1, (-db) / VIZ_DB_RANGE));
        t = Math.pow(t, VIZ_GAMMA);     // compress gentle skirts (narrower 6 dB look)
        return respTopY + (respBaseY - respTopY) * t;
      }
      function drawBand (which, fill, stroke) {
        ctx.beginPath();
        ctx.moveTo(0, respBaseY);
        for (let x = 0; x <= w; x += 2) {
          const f = xToFreq(x + 0.0001, w);
          ctx.lineTo(x, dbToY(bandDb(f, which)));
        }
        ctx.lineTo(w, respBaseY);
        ctx.closePath();
        ctx.fillStyle = fill;
        ctx.fill();
        // stroke top edge only
        ctx.beginPath();
        for (let x = 0; x <= w; x += 2) {
          const f = xToFreq(x + 0.0001, w);
          const y = dbToY(bandDb(f, which));
          if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 1.4;
        ctx.stroke();
      }
      drawBand(0, 'rgba(58,184,212,0.10)',  'rgba(58,184,212,0.80)');   // LOW  cyan
      drawBand(1, 'rgba(95,200,138,0.10)',  'rgba(95,200,138,0.80)');   // MID  mint
      drawBand(2, 'rgba(214,136,74,0.10)',  'rgba(214,136,74,0.80)');   // HIGH amber

      // Crossover line + freq label. Always rendered. Brighter when revealed.
      // active = mid-drag.  revealed = drag/hover/recent change (last 1.2s).
      function drawCrossoverLabel(x, freq, slope, active, revealed) {
        ctx.save();
        // Vertical dashed line — copper, always visible, brighter when revealed
        const lineAlpha = active ? 0.85 : (revealed ? 0.7 : 0.45);
        ctx.strokeStyle = active
          ? 'rgba(199,125,255,' + lineAlpha + ')'
          : 'rgba(212,165,116,' + lineAlpha + ')';
        ctx.lineWidth = 1.2;
        ctx.setLineDash([4,3]);
        ctx.beginPath(); ctx.moveTo(x,16); ctx.lineTo(x,h-20); ctx.stroke();
        ctx.setLineDash([]);
        // Small grip dot at top of line (clear drag affordance)
        ctx.beginPath();
        ctx.arc(x, 16, active ? 4.5 : 3.5, 0, Math.PI*2);
        ctx.fillStyle = active ? '#c77dff' : '#d4a574';
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.55)';
        ctx.lineWidth = 0.8;
        ctx.stroke();

        // Pill label at top — always show freq, also slope when revealed
        const txt = revealed
          ? fmtFreq(freq) + ' Hz  ·  ' + slope.toFixed(1) + ' dB/oct'
          : fmtFreq(freq) + ' Hz';
        ctx.font = revealed ? 'bold 10px "JetBrains Mono", ui-monospace, monospace'
                            : '9px "JetBrains Mono", ui-monospace, monospace';
        const tw = ctx.measureText(txt).width;
        const px = 6;
        const lx = Math.max(2, Math.min(w - tw - px*2 - 2, x - tw/2 - px));
        const ly = revealed ? 2 : 24;     // dim label sits LOWER (under grip) — keeps top clean
        const lh = revealed ? 16 : 13;
        const rr = 6;
        ctx.fillStyle = revealed ? 'rgba(20,17,15,0.92)' : 'rgba(20,17,15,0.65)';
        ctx.strokeStyle = active
          ? 'rgba(199,125,255,0.85)'
          : (revealed ? 'rgba(212,165,116,0.7)' : 'rgba(212,165,116,0.35)');
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(lx+rr, ly);
        ctx.lineTo(lx+tw+px*2-rr, ly);
        ctx.quadraticCurveTo(lx+tw+px*2, ly, lx+tw+px*2, ly+rr);
        ctx.lineTo(lx+tw+px*2, ly+lh-rr);
        ctx.quadraticCurveTo(lx+tw+px*2, ly+lh, lx+tw+px*2-rr, ly+lh);
        ctx.lineTo(lx+rr, ly+lh);
        ctx.quadraticCurveTo(lx, ly+lh, lx, ly+lh-rr);
        ctx.lineTo(lx, ly+rr);
        ctx.quadraticCurveTo(lx, ly, lx+rr, ly);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        ctx.fillStyle = active ? '#f0e6ff' : (revealed ? '#e8d4b8' : '#a88860');
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(txt, lx + px, ly + lh/2);
        ctx.textBaseline = 'alphabetic';
        ctx.restore();
      }
      // ALWAYS draw crossover lines + labels so user sees filter location.
      // Bright/active when revealed (drag/hover/recent change), dim otherwise.
      drawCrossoverLabel(xLM, crossoverLowMid,  slopeLowMid,  draggingHandle === 'lm', showLM);
      drawCrossoverLabel(xMH, crossoverMidHigh, slopeMidHigh, draggingHandle === 'mh', showMH);

      const lo = document.getElementById('low-freq-range');
      const mi = document.getElementById('mid-freq-range');
      const hi = document.getElementById('high-freq-range');
      if (lo) lo.textContent = '20 - ' + fmtFreq(crossoverLowMid) + ' Hz';
      if (mi) mi.textContent = fmtFreq(crossoverLowMid) + ' - ' + fmtFreq(crossoverMidHigh) + ' Hz';
      if (hi) hi.textContent = fmtFreq(crossoverMidHigh) + ' - 20k Hz';
    }

    (function installCrossoverInteraction() {
      const canvas = document.getElementById('spectrum-canvas');

      // Hover detection — show crossover line when pointer near it
      canvas.addEventListener('mousemove', (e) => {
        if (draggingHandle) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left, w = rect.width;
        const xLM = freqToX(crossoverLowMid, w), xMH = freqToX(crossoverMidHigh, w);
        const dLM = Math.abs(x - xLM), dMH = Math.abs(x - xMH);
        const NEAR = 25;
        let newHover = null;
        if (dLM < dMH && dLM < NEAR) newHover = 'lm';
        else if (dMH < NEAR) newHover = 'mh';
        if (newHover !== hoverHandle) {
          hoverHandle = newHover;
          canvas.style.cursor = newHover ? 'ew-resize' : 'default';
        }
      });
      canvas.addEventListener('mouseleave', () => { hoverHandle = null; canvas.style.cursor = 'default'; });

      canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left, y = e.clientY - rect.top, w = rect.width;
        const xLM = freqToX(crossoverLowMid, w), xMH = freqToX(crossoverMidHigh, w);
        if (Math.abs(x-xLM) < 15) draggingHandle = 'lm';
        else if (Math.abs(x-xMH) < 15) draggingHandle = 'mh';
        else return;
        e.preventDefault();
        draggingMode = null;
        const startX = x, startY = y;
        const startSlope = (draggingHandle === 'lm') ? slopeLowMid : slopeMidHigh;
        const onMove = (e2) => {
          const mx = e2.clientX - rect.left;
          const my = e2.clientY - rect.top;
          if (draggingMode === null) {
            // First few px decide mode: horizontal = freq, vertical = slope
            const dx = Math.abs(mx - startX), dy = Math.abs(my - startY);
            if (Math.max(dx, dy) < 3) return;
            draggingMode = (dy > dx) ? 'slope' : 'freq';
          }
          if (draggingMode === 'freq') {
            const f = Math.max(20, Math.min(20000, xToFreq(mx, w)));
            if (draggingHandle === 'lm') {
              crossoverLowMid = Math.min(f, crossoverMidHigh - 50);
              setCrossoverFromHz('lm', crossoverLowMid);
            } else {
              crossoverMidHigh = Math.max(f, crossoverLowMid + 50);
              setCrossoverFromHz('mh', crossoverMidHigh);
            }
          } else {
            // Slope: vertical drag, up = steeper (higher dB/oct). 200 px = full range.
            const dy = startY - my;                            // up positive
            const newSlope = Math.max(SLOPE_MIN, Math.min(SLOPE_MAX, startSlope + (dy / 200) * (SLOPE_MAX - SLOPE_MIN)));
            setSlope(draggingHandle, newSlope);
          }
        };
        const onUp = () => {
          draggingHandle = null; draggingMode = null;
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });

      // Mouse wheel on handle = slope
      canvas.addEventListener('wheel', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left, w = rect.width;
        const xLM = freqToX(crossoverLowMid, w), xMH = freqToX(crossoverMidHigh, w);
        let which = null;
        if (Math.abs(x-xLM) < 20) which = 'lm';
        else if (Math.abs(x-xMH) < 20) which = 'mh';
        if (!which) return;
        e.preventDefault();
        const cur = (which === 'lm') ? slopeLowMid : slopeMidHigh;
        const dir = -Math.sign(e.deltaY);    // wheel up = steeper
        setSlope(which, cur + dir * SLOPE_STEP);
      }, { passive: false });
    })();

    function setSlope(which, val) {
      const snapped = snapSlope(val);
      if (which === 'lm') { slopeLowMid = snapped; revealLM(); } else { slopeMidHigh = snapped; revealMH(); }
      const id = which === 'lm' ? 'crossover_low_mid_slope' : 'crossover_mid_high_slope';
      const norm = (snapped - SLOPE_MIN) / (SLOPE_MAX - SLOPE_MIN);
      const st = getSlider(id);
      if (st) { try { st.setNormalisedValue(Math.max(0, Math.min(1, norm))); } catch(e) {} }
    }

    async function refreshBrowserList() {

      // Filter

        if (browserFormatFilter && p.format !== browserFormatFilter) return false;
        if (browserSearchTerm) {
          const hay = (p.name + ' ' + p.manufacturer + ' ' + p.category).toLowerCase();
          if (hay.indexOf(browserSearchTerm) === -1) return false;
        }
        return true;
      });

      if (filtered.length === 0) {
        if (plugins.length === 0) {
          list.innerHTML = '<div class="browser-empty italic">No plugins yet. Click <b>Scan</b> to find installed VST3/AU plugins.</div>';
        } else {
          list.innerHTML = '<div class="browser-empty italic">No matches.</div>';

      // Group by manufacturer
      const groups = {};
      filtered.forEach(p => {

    // ─── RESIZE (CSS zoom for sharp HiDPI) ─────────────────────────────────
    const DESIGN_W = 1400, DESIGN_H = 800;
    function updateScale() {
      const shell = document.getElementById('pluginShell');
      shell.style.zoom = '1';
      const scaleX = window.innerWidth / DESIGN_W;
      const scaleY = window.innerHeight / DESIGN_H;
      const scale = Math.min(scaleX, scaleY);
      shell.style.zoom = scale;
      document.documentElement.style.setProperty('--ui-scale', scale);
    }
    window.addEventListener('resize', updateScale);

    // ─── PARAMETER BINDING (UI ↔ APVTS) ────────────────────────────────────
    // Map each knob/button with data-param-id to its JUCE SliderState/ToggleState.
    // Without this, UI changes don't affect audio engine.
    const sliderStateCache = {};
    const toggleStateCache = {};

    function getSlider(id) {
      if (!window.J || !window.J.getSliderState) return null;
      if (sliderStateCache[id] === undefined) {
        try { sliderStateCache[id] = window.J.getSliderState(id) || null; }
        catch (e) { sliderStateCache[id] = null; }
      }
      return sliderStateCache[id];
    }
    function getToggle(id) {
      if (!window.J || !window.J.getToggleState) return null;
      if (toggleStateCache[id] === undefined) {
        try { toggleStateCache[id] = window.J.getToggleState(id) || null; }
        catch (e) { toggleStateCache[id] = null; }
      }
      return toggleStateCache[id];
    }

    function bindKnobToJUCE(knob) {
      const id = knob.dataset.paramId;
      if (!id) return;
      const state = getSlider(id);
      if (!state) return;

      // JUCE → UI: listen for param changes from DAW/host/state restore
      try {
        state.valueChangedEvent.addListener(() => {
          const v = state.getNormalisedValue();
          if (Math.abs(v - parseFloat(knob.dataset.value)) < 0.0001) return;
          knob.dataset.value = v;
          drawKnob(knob.querySelector('canvas'), v, getKnobColor(knob));
          updateIndicator(knob);
          updateKnobDisplay(knob);
        });
        const v = state.getNormalisedValue();
        if (!isNaN(v)) {
          knob.dataset.value = v;
          drawKnob(knob.querySelector('canvas'), v, getKnobColor(knob));
          updateIndicator(knob);
          updateKnobDisplay(knob);
        }
      } catch (e) {}

      // UI → JUCE: hook data-value mutation via wrapping the existing drag logic
      // setupKnobDrag uses onMove that updates knob.dataset.value. Watch via MutationObserver.
      const observer = new MutationObserver((muts) => {
        for (const m of muts) {
          if (m.attributeName === 'data-value') {
            const v = parseFloat(knob.dataset.value);
            try { state.setNormalisedValue(v); } catch (e) {}
          }
        }
      });
      observer.observe(knob, { attributes: true, attributeFilter: ['data-value'] });
    }

    function bindToggleToJUCE(btn) {
      const id = btn.dataset.paramId;
      const action = btn.dataset.action;  // 'solo' | 'mute' | 'bypass' | undefined (generic 'active')
      if (!id) return;
      const state = getToggle(id);
      if (!state) return;

      const cls = action ? (action + '-active') : 'active';

      try {
        state.valueChangedEvent.addListener(() => {
          const on = state.getValue();
          btn.classList.toggle(cls, on);
          // Visual side-effects for bypass — scope by button class
          if (action === 'bypass') {
            if (btn.classList.contains('slot-btn')) {
              // Slot-level bypass → only slot-card
              const card = btn.closest('.slot-card');
              if (card) card.classList.toggle('bypassed', on);
            } else if (btn.classList.contains('band-btn')) {
              // Band-level bypass → only band-column (skip the enclosing slot/card)
              const col = btn.closest('.band-column');
              if (col) col.classList.toggle('bypassed', on);
            }
          }
        });
        // Sync initial
        const v = state.getValue();
        btn.classList.toggle(cls, v);
      } catch (e) {}

      // Intercept click in capture phase, push to JUCE
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        e.preventDefault();
        try { state.setValue(!state.getValue()); } catch (err) {}
      }, true);
      // Remove original inline onclick by clearing it (data-toggle marker)
      btn.onclick = null;
    }

    function bindAllParams() {
      if (!window.J || !window.J.getSliderState) {
        window.addEventListener('juce-ready', bindAllParams, { once: true });
        return;
      }
      document.querySelectorAll('.knob[data-param-id]').forEach(bindKnobToJUCE);
      document.querySelectorAll('[data-toggle="true"]').forEach(bindToggleToJUCE);

      // Crossover handles: bind drag to APVTS freq params
      // JUCE param uses setSkewForCentre(632) → skew constant below matches exactly.
      const xLM = getSlider('crossover_low_mid');
      const xMH = getSlider('crossover_mid_high');
      if (xLM) {
        xLM.valueChangedEvent.addListener(() => {
          crossoverLowMid = normToHz(xLM.getNormalisedValue());
        });
        try { crossoverLowMid = normToHz(xLM.getNormalisedValue()); } catch (e) {}
      }
      if (xMH) {
        xMH.valueChangedEvent.addListener(() => {
          crossoverMidHigh = normToHz(xMH.getNormalisedValue());
        });
        try { crossoverMidHigh = normToHz(xMH.getNormalisedValue()); } catch (e) {}
      }

      // Slope params (6..96 step 6 = 16 morphable values)
      const sLM = getSlider('crossover_low_mid_slope');
      const sMH = getSlider('crossover_mid_high_slope');
      function readSlope(st) {
        try {
          const val = SLOPE_MIN + st.getNormalisedValue() * (SLOPE_MAX - SLOPE_MIN);
          return snapSlope(val);
        } catch(e) { return 24; }
      }
      if (sLM) {
        sLM.valueChangedEvent.addListener(() => { slopeLowMid = readSlope(sLM); });
        slopeLowMid = readSlope(sLM);
      }
      if (sMH) {
        sMH.valueChangedEvent.addListener(() => { slopeMidHigh = readSlope(sMH); });
        slopeMidHigh = readSlope(sMH);
      }
    }

    // JUCE NormalisableRange.setSkewForCentre(632) on (20, 20000):
    //   skew = ln(0.5) / ln((632 - 20) / (20000 - 20)) ≈ 0.198828
    // norm→hz: 20 + 19980 * pow(norm, 1/skew)
    // hz→norm: pow((hz - 20)/19980, skew)
    const FREQ_SKEW = Math.log(0.5) / Math.log((632.0 - 20.0) / (20000.0 - 20.0));
    function normToHz(n)  { return Math.max(20, Math.min(20000, 20 + 19980 * Math.pow(n, 1 / FREQ_SKEW))); }
    function hzToNorm(hz) { return Math.max(0, Math.min(1, Math.pow((hz - 20) / 19980, FREQ_SKEW))); }

    function setCrossoverFromHz(which, hz) {
      const id = which === 'lm' ? 'crossover_low_mid' : 'crossover_mid_high';
      const st = getSlider(id);
      if (st) { try { st.setNormalisedValue(hzToNorm(hz)); } catch (e) {} }
      if (which === 'lm') revealLM(); else revealMH();
    }

    // ─── UNDO / REDO ──────────────────────────────────────────────────────
    (function installUndo() {
      const ub = document.getElementById('undoBtn');
      const rb = document.getElementById('redoBtn');
      if (!ub || !rb) return;
      function refreshState() {
        if (!juceGetUndoState) return;
        juceGetUndoState().then(s => {
          if (!s) return;
          ub.disabled = !s.canUndo;
          rb.disabled = !s.canRedo;
        }).catch(() => {});
      }
      ub.addEventListener('click', () => { if (juceUndo) juceUndo().then(refreshState); });
      rb.addEventListener('click', () => { if (juceRedo) juceRedo().then(refreshState); });
      // Hotkeys: Cmd/Ctrl+Z = undo, Cmd+Shift+Z or Ctrl+Y = redo
      window.addEventListener('keydown', (e) => {
        const mod = e.metaKey || e.ctrlKey;
        if (!mod) return;
        if (e.key === 'z' || e.key === 'Z') {
          e.preventDefault();
          if (e.shiftKey) { if (juceRedo) juceRedo().then(refreshState); }
          else            { if (juceUndo) juceUndo().then(refreshState); }
        } else if (e.key === 'y' || e.key === 'Y') {
          e.preventDefault();
          if (juceRedo) juceRedo().then(refreshState);
        }
      });
      // Refresh enable-state ~3 Hz
      setInterval(refreshState, 300);
    })();

    // ─── INIT ─────────────────────────────────────────────────────────────
    buildBands();
    initAllKnobs();
    bindAllParams();
    updateScale();

    // Build band-strip knobs via CVKnob lib once JUCE ready.
    if (!buildBandCVKnobs()) {
      window.addEventListener('juce-ready', buildBandCVKnobs, { once: true });
    }

    // Spectrum polling — pull FFT from C++ ~30Hz
    window.__spectrumBins = null;
    function pollSpectrum() {
      if (juceGetSpectrum) {
        try {
          juceGetSpectrum().then(obj => {
            if (obj && (obj.input || obj.output)) window.__spectrumBins = obj;
          }).catch(() => {});
        } catch (e) {}
      }
    }
    setInterval(pollSpectrum, 33);

    (function animate() { drawSpectrum(); requestAnimationFrame(animate); })();

    // ─── MAKE CHAOS — random mutation system (Chaosverb pattern) ──────
    // Randomizes per-band sound-shaping params on demand or on a timer.
    // What randomizes  : dry_wet, input_gain, output_gain, ms_morph
    // What stays fixed : crossover freqs, solo/mute/bypass, slot routing,
    //                    linear phase, global in/out/dry-wet
    // Locks            : right-click any knob to exclude it from chaos.
    //                    Lock state is per-session (not persisted to APVTS).
    // Interval         : user-adjustable 5s..600s log-scale via header slider.
    (function installChaos() {
      const CHAOS_BANDS  = ['low', 'mid', 'high'];
      const CHAOS_PARAMS = ['dry_wet', 'input_gain', 'output_gain', 'ms_morph'];

      // Mode + slider-driven value. Slider 0..1000 maps to either:
      //   MS:   100ms (0) → 600000ms (1000), log scale
      //   SYNC: nearest index in SYNC_VALUES (snap)
      const SYNC_VALUES = [
        { label: '1/32',  beats: 0.125 },
        { label: '1/16',  beats: 0.25  },
        { label: '1/8',   beats: 0.5   },
        { label: '1/4',   beats: 1     },
        { label: '1/2',   beats: 2     },
        { label: '1 BAR', beats: 4     },
        { label: '2 BAR', beats: 8     },
        { label: '4 BAR', beats: 16    },
        { label: '8 BAR', beats: 32    },
      ];
      const MS_MIN_S = 0.1;        // 100ms
      const MS_MAX_S = 600;        // 10 minutes
      const LOG_MIN_S = Math.log(MS_MIN_S);
      const LOG_MAX_S = Math.log(MS_MAX_S);

      let mode = 'MS';
      let msSlider = 700;          // ~30s after log mapping
      let syncSlider = 333;        // ~1/4 in SYNC mode
      try {
        const stored = JSON.parse(localStorage.getItem('multiblend.chaosTimer') || '{}');
        if (stored.mode === 'MS' || stored.mode === 'SYNC') mode = stored.mode;
        if (typeof stored.msSlider === 'number')   msSlider = stored.msSlider;
        if (typeof stored.syncSlider === 'number') syncSlider = stored.syncSlider;
      } catch (e) {}

      function persistTimer() {
        try { localStorage.setItem('multiblend.chaosTimer', JSON.stringify({ mode, msSlider, syncSlider })); } catch (e) {}
      }

      function sliderToMs(s) {
        const t = Math.max(0, Math.min(1, s / 1000));
        const secs = Math.exp(LOG_MIN_S + t * (LOG_MAX_S - LOG_MIN_S));
        return secs * 1000;
      }
      function sliderToSyncIdx(s) {
        const t = Math.max(0, Math.min(1, s / 1000));
        return Math.max(0, Math.min(SYNC_VALUES.length - 1, Math.round(t * (SYNC_VALUES.length - 1))));
      }
      function fmtMs(ms) {
        if (ms < 1000) return Math.round(ms) + 'ms';
        const secs = ms / 1000;
        if (secs < 60) return secs.toFixed(secs < 10 ? 1 : 0) + 's';
        const m = Math.floor(secs / 60);
        const s = Math.round(secs - m * 60);
        return s === 0 ? m + 'm' : m + 'm' + s + 's';
      }

      let lastHostBpm = 120.0;
      let timerId    = null;
      let tickerId   = null;
      let nextFireMs = 0;
      const lockedIds = new Set();

      const btn      = document.getElementById('makeChaosBtn');
      const cd       = document.getElementById('chaosCountdown');
      const tt       = document.getElementById('chaosTimerToggle');
      const modeBtn  = document.getElementById('chaosModeBtn');
      const intLbl   = document.getElementById('chaosIntervalLabel');
      const intSl    = document.getElementById('chaosIntervalSlider');
      if (!btn || !cd || !tt || !modeBtn || !intLbl || !intSl) return;

      function currentIntervalMs() {
        if (mode === 'SYNC') {
          const idx = sliderToSyncIdx(syncSlider);
          const bpm = (lastHostBpm > 1.0) ? lastHostBpm : 120.0;
          return (60000.0 / bpm) * SYNC_VALUES[idx].beats;
        }
        return sliderToMs(msSlider);
      }

      function refreshTimerUI() {
        modeBtn.textContent = mode;
        modeBtn.classList.toggle('sync-mode', mode === 'SYNC');
        if (mode === 'SYNC') {
          intSl.value = syncSlider;
          intLbl.textContent = SYNC_VALUES[sliderToSyncIdx(syncSlider)].label;
        } else {
          intSl.value = msSlider;
          intLbl.textContent = fmtMs(sliderToMs(msSlider));
        }
      }
      refreshTimerUI();

      modeBtn.addEventListener('click', () => {
        mode = (mode === 'MS') ? 'SYNC' : 'MS';
        persistTimer();
        refreshTimerUI();
        if (timerId) { stop(); start(); }
      });
      intSl.addEventListener('input', () => {
        const v = parseInt(intSl.value, 10);
        if (mode === 'SYNC') syncSlider = v; else msSlider = v;
        persistTimer();
        refreshTimerUI();
        // Don't restart timer mid-drag — apply on release
      });
      intSl.addEventListener('change', () => {
        if (timerId) { stop(); start(); }
      });

      // Poll host BPM ~2Hz when in sync mode
      setInterval(() => {
        if (mode !== 'SYNC' || !juceGetHostBpm) return;
        try {
          juceGetHostBpm().then(v => { if (typeof v === 'number' && v > 1.0) lastHostBpm = v; });
        } catch (e) {}
      }, 500);

      function fmt(secs) {
        const m = Math.floor(secs / 60);
        const s = secs % 60;
        return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
      }

      // ─── Countdown tick ────────────────────────────────────────────
      function tick() {
        if (!timerId) return;
        const remMs = Math.max(0, nextFireMs - performance.now());
        cd.textContent = fmt(Math.ceil(remMs / 1000));
      }

      // ─── Mutation fire ─────────────────────────────────────────────
      function fire() {
        // Single C++ call → opens transaction, randomizes knobs, shuffles, closes.
        // Whole CHAOS = one undo step. Knob UI updates via valueChangedEvent
        // listeners (already wired in bindKnobToJUCE / CVKnob slider state).
        if (juceTriggerChaos) {
          try {
            const lockedParamArr = Array.from(lockedIds);
            juceTriggerChaos(lockedLinearCoords(), lockedParamArr);
          } catch (e) {}
        }

        btn.classList.add('firing');
        setTimeout(() => btn.classList.remove('firing'), 350);
        cd.classList.remove('pulse');
        void cd.offsetWidth;
        cd.classList.add('pulse');
      }

      // ─── Timer control ─────────────────────────────────────────────
      function start() {
        stop();
        const ms = currentIntervalMs();
        nextFireMs = performance.now() + ms;
        // Use setTimeout-chain so BPM changes recompute interval each cycle
        const scheduleNext = () => {
          const dt = currentIntervalMs();
          nextFireMs = performance.now() + dt;
          timerId = setTimeout(() => {
            fire();
            scheduleNext();
          }, dt);
        };
        scheduleNext();
        tickerId = setInterval(tick, 250);
        tt.classList.remove('is-stopped');
        tt.textContent = 'STOP';
        cd.classList.remove('stopped');
        tick();
      }
      function stop() {
        if (timerId)  { clearTimeout(timerId);  timerId  = null; }
        if (tickerId) { clearInterval(tickerId); tickerId = null; }
        tt.classList.add('is-stopped');
        tt.textContent = 'START';
        cd.classList.add('stopped');
        cd.textContent = '--:--';
      }

      // ─── Button hookups ────────────────────────────────────────────
      btn.addEventListener('click', () => {
        fire();
        if (timerId) {
          const dt = currentIntervalMs();
          nextFireMs = performance.now() + dt;
          tick();
        }
      });
      tt.addEventListener('click', () => {
        if (timerId) stop(); else start();
      });

      // ─── Lock system ──────────────────────────────────────────────
      // 3 levels (right-click):
      //   1. Knob param → lockedIds (param ID string)
      //   2. Slot card  → slotLocks (key "band_X_slot_Y")
      //   3. Band label → bandLocks (key "band_X")
      // Knobs handled first (most specific). Then slot/band fallback.
      const slotLocks = new Set();
      const bandLocks = new Set();
      window.__chaosSlotLocks = slotLocks;
      window.__chaosBandLocks = bandLocks;

      // Linear coord helper (band index 0-2, slot 0-4) → int key matching C++ side
      const BAND_INDEX = { low: 0, mid: 1, high: 2 };
      function lockedLinearCoords() {
        const set = new Set();
        // Slot locks → linear
        slotLocks.forEach(key => {
          const m = key.match(/^band_(low|mid|high)_slot_(\d)$/);
          if (m) set.add(BAND_INDEX[m[1]] * 5 + (parseInt(m[2]) - 1));
        });
        // Band locks → expand to all 5 slots in that band
        bandLocks.forEach(key => {
          const m = key.match(/^band_(low|mid|high)$/);
          if (m) for (let s = 0; s < 5; s++) set.add(BAND_INDEX[m[1]] * 5 + s);
        });
        return Array.from(set);
      }

      document.addEventListener('contextmenu', (e) => {
        // 1a. Legacy knob lock (.knob[data-param-id]) — global header knobs + slot D/W
        const knob = e.target.closest && e.target.closest('.knob[data-param-id]');
        if (knob) {
          e.preventDefault();
          const id = knob.dataset.paramId;
          if (!id) return;
          if (lockedIds.has(id)) { lockedIds.delete(id); knob.classList.remove('chaos-locked'); }
          else                   { lockedIds.add(id);    knob.classList.add('chaos-locked'); }
          return;
        }
        // 1b. CVKnob lock (.knob-wrap[data-param]) — band In/Out/D-W/M-S
        const cv = e.target.closest && e.target.closest('.knob-wrap[data-param]');
        if (cv) {
          e.preventDefault();
          const id = cv.getAttribute('data-param');
          if (!id) return;
          if (lockedIds.has(id)) { lockedIds.delete(id); cv.classList.remove('chaos-locked'); }
          else                   { lockedIds.add(id);    cv.classList.add('chaos-locked'); }
          return;
        }
        // 2. Band label lock (right-click on .band-label)
        const bandLabel = e.target.closest && e.target.closest('.band-label[data-band]');
        if (bandLabel) {
          e.preventDefault();
          const band = bandLabel.dataset.band;
          const key = 'band_' + band;
          const col = document.querySelector('.band-column[data-band="' + band + '"]');
          if (bandLocks.has(key)) { bandLocks.delete(key); col && col.classList.remove('chaos-locked-band'); }
          else                    { bandLocks.add(key);    col && col.classList.add('chaos-locked-band'); }
          return;
        }
        // 3. Slot card lock (any other right-click inside .slot-card)
        const slot = e.target.closest && e.target.closest('.slot-card[data-band][data-slot]');
        if (slot) {
          e.preventDefault();
          const band = slot.dataset.band;
          const idx  = slot.dataset.slot;
          const key = 'band_' + band + '_slot_' + idx;
          if (slotLocks.has(key)) { slotLocks.delete(key); slot.classList.remove('chaos-locked-slot'); }
          else                    { slotLocks.add(key);    slot.classList.add('chaos-locked-slot'); }
          return;
        }
      });

      window.__chaos = { fire, start, stop, lockedIds, slotLocks, bandLocks, lockedLinearCoords };
    })();
  </script>
</body>
</html>
