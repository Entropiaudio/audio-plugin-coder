<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNIP Bridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #040608;
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: monospace;
    }

    #plugin {
      width: 100vw;
      height: 100vh;
      background: #080c14;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* -- HEADER -- */
    .header {
      height: 40px;
      background: #0a0e1a;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      padding: 0 20px;
      flex-shrink: 0;
      gap: 16px;
    }
    .logo { font-size: 14px; font-weight: 700; letter-spacing: 3px; color: #fff; }
    .logo span { color: #E91E8C; text-shadow: 0 0 14px rgba(233,30,140,0.4); }
    .hsel {
      background: #0d1120; color: rgba(160,185,220,0.75);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
      padding: 3px 8px; font-family: monospace; font-size: 9px;
      outline: none; cursor: pointer;
    }
    .send-btn {
      background: linear-gradient(180deg,rgba(255,255,255,0.1) 0%,transparent 40%,rgba(0,0,0,0.15) 100%),
                  linear-gradient(180deg,#F02A96,#C4167A);
      color: #fff; font-family: monospace; font-weight: 700; font-size: 11px;
      letter-spacing: 1.5px; text-transform: uppercase; border: none;
      border-top: 1px solid rgba(255,255,255,0.18); border-radius: 5px;
      padding: 7px 22px; cursor: pointer;
      box-shadow: 0 2px 10px rgba(233,30,140,0.3);
      transition: filter 0.15s, box-shadow 0.15s;
    }
    .send-btn:hover { filter: brightness(1.15); box-shadow: 0 2px 18px rgba(233,30,140,0.5); }
    .send-btn.sending { animation: pulse-glow 1.2s ease-in-out infinite; }
    .send-btn.sent { background: linear-gradient(180deg,rgba(255,255,255,0.1) 0%,transparent 40%,rgba(0,0,0,0.15) 100%), linear-gradient(180deg,#00F08A,#00C864); animation: none; }
    @keyframes pulse-glow {
      0%,100% { box-shadow: 0 2px 10px rgba(233,30,140,0.3); }
      50% { box-shadow: 0 2px 24px rgba(233,30,140,0.6), 0 0 40px rgba(233,30,140,0.2); }
    }
    .plbl { font-size: 8px; letter-spacing: 2.5px; color: rgba(160,185,220,0.38); text-transform: uppercase; }

    /* -- BODY -- */
    .body { flex: 1; display: flex; overflow: hidden; }

    /* -- SPECTRUM -- */
    #spec-panel {
      width: 70%; min-width: 120px; background: #0d1018;
      display: flex; flex-direction: column; padding: 10px 12px 8px;
      flex-shrink: 0;
    }

    /* -- SPLITTERS -- */
    .splitter { background: rgba(255,255,255,0.04); flex-shrink: 0; position: relative; z-index: 10; }
    .splitter:hover { background: rgba(233,30,140,0.25); }
    .splitter:active, .splitter.dragging { background: rgba(233,30,140,0.4); }
    .splitter-v { width: 5px; cursor: col-resize; }
    .splitter-h { height: 5px; cursor: row-resize; }

    /* -- RIGHT PANEL -- */
    #right-panel { flex: 1; display: flex; flex-direction: column; min-width: 120px; overflow: hidden; }

    /* -- VECTORSCOPE PANEL -- */
    #vs-panel {
      display: flex; flex-direction: column; align-items: center;
      padding: 8px 12px; background: #0d1018; min-height: 0;
      overflow: hidden; flex: 1.6 1 0%; min-width: 0;
    }
    #vs-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 0; overflow: hidden; width: 100%; }
    #vs-sub { position: relative; display: flex; flex-direction: column; align-items: center; padding: 5px 4px 0; flex-shrink: 0; align-self: center; }

    /* -- CORR/BAL HORIZONTAL BARS -- */
    .hbar-group { width: 100%; margin-top: 5px; }
    .hbar-row { display: flex; align-items: center; margin-bottom: 2px; }
    .hbar-track { position: relative; flex: 1; height: 6px; background: rgba(0,0,0,0.5); border-radius: 3px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
    .hbar-center { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.15); transform: translateX(-50%); }
    .hbar-ind { position: absolute; top: 0; bottom: 0; width: 4px; border-radius: 2px; background: #ff9020; box-shadow: 0 0 6px rgba(255,144,32,0.5); transform: translateX(-50%); transition: left 80ms ease-out; }
    .hbar-ends { display: flex; justify-content: space-between; margin-top: 1px; }
    .hbar-ends span { font-size: 6px; color: rgba(140,190,220,0.25); }
    .hbar-name { font-size: 6px; color: rgba(140,190,220,0.35); text-transform: uppercase; letter-spacing: 1px; text-align: center; }

    /* -- METERS PANEL -- */
    #meters-panel { display: flex; flex-direction: row; background: #0d1018; min-height: 0; overflow: hidden; flex: 1 1 0%; }
    #lufs-readouts { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 6px; padding: 10px 16px; min-width: 0; overflow: hidden; }
    .lr-row { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.06); border-radius: 4px; flex: 1; min-height: 0; }
    .lr-label { font-size: 13px; font-weight: 700; min-width: 30px; }
    .lr-value { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; margin-left: auto; color: rgba(230,240,250,0.85); }
    .lr-unit { font-size: 9px; color: rgba(160,185,220,0.38); letter-spacing: 0.5px; }

    /* -- FEEDBACK -- */
    #fb-panel { display: flex; flex-direction: row; gap: 10px; padding: 10px 14px; flex: 1 1 0%; min-height: 0; overflow: hidden; background: #0d1018; align-items: stretch; }
    #fb-arc-area { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; min-height: 0; overflow: visible; flex-shrink: 0; }
    .fb-score { font-size: 15px; font-weight: 600; letter-spacing: -0.5px; margin-top: -3px; }
    .fb-match-lbl { font-size: 6px; letter-spacing: 1.5px; color: rgba(160,185,220,0.35); text-transform: uppercase; }
    #fb-right { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; gap: 3px; min-width: 0; min-height: 0; overflow: auto; }
    #genre-name { font-size: 9px; font-weight: 600; color: rgba(200,215,240,0.8); margin-bottom: 1px; flex-shrink: 0; }
    .mrow { display: flex; flex-direction: column; gap: 1px; }
    .mtop { display: flex; align-items: center; gap: 4px; }
    .micon { font-size: 7px; width: 10px; text-align: center; font-weight: 700; }
    .mname { font-size: 7px; color: rgba(200,215,235,0.6); width: 52px; }
    .mbarw { flex: 1; height: 2px; background: rgba(0,0,0,0.5); border-radius: 2px; overflow: hidden; }
    .mbar { height: 100%; border-radius: 2px; transition: width 400ms ease; }
    .mpct { font-size: 7px; font-weight: 600; min-width: 24px; text-align: right; }
    .mmsg { padding-left: 14px; font-size: 6px; color: rgba(140,160,195,0.5); line-height: 1.3; word-wrap: break-word; overflow-wrap: break-word; }
  </style>
</head>
<body>
<div id="plugin">

  <!-- HEADER -->
  <div class="header">
    <div style="display:flex;flex-direction:column;gap:0;">
      <div class="logo">SNIP <span>BRIDGE</span></div>
      <span style="font-size:7px;letter-spacing:1.5px;color:rgba(160,185,220,0.28);margin-top:-2px;">v0.1.0</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px;margin-left:12px;position:relative;">
      <span class="plbl">Genre</span>
      <button id="genre-toggle-btn" style="background:#0d1120;color:rgba(160,185,220,0.75);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:3px 8px;font-family:monospace;font-size:9px;cursor:pointer;min-width:90px;text-align:left;display:flex;align-items:center;justify-content:space-between;gap:6px;">
        <span id="genre-btn-label">Hip-Hop / Trap</span>
        <span style="font-size:7px;opacity:0.5;">&#9660;</span>
      </button>
      <div id="genre-panel" style="display:none;position:absolute;top:100%;left:0;z-index:100;background:#0d1120;border:1px solid rgba(255,255,255,0.15);border-radius:4px;padding:6px 0;margin-top:4px;min-width:170px;box-shadow:0 4px 16px rgba(0,0,0,0.6);max-height:260px;overflow-y:auto;">
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <span class="plbl">Speed</span>
      <input type="range" min="0" max="100" step="1" value="15" id="speed-sl"
        style="-webkit-appearance:none;width:70px;height:3px;background:#1a1e2e;border-radius:2px;outline:none;">
      <span id="speed-val" style="font-size:9px;color:#00d4ff;min-width:38px;">Fast</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
      <div id="status-led" style="width:6px;height:6px;border-radius:50%;background:#00e676;box-shadow:0 0 6px rgba(0,230,118,0.6);"></div>
      <span id="status-text" style="font-size:9px;color:rgba(160,185,220,0.4);">Ready</span>
    </div>
    <button class="send-btn" id="btn_send_snip">Send to Meetsnip</button>
  </div>

  <!-- BODY -->
  <div class="body">

    <!-- SPECTRUM -->
    <div id="spec-panel">
      <div style="display:flex;align-items:center;margin-bottom:6px;gap:12px;">
        <span class="plbl">Spectrum</span>
        <div style="display:flex;align-items:center;gap:10px;margin-left:auto;">
          <div style="display:flex;align-items:center;gap:4px;">
            <div style="width:14px;height:2px;background:linear-gradient(90deg,#ff6030,#ffd028,#50e650,#00dcc8,#1e96ff,#b450ff);border-radius:1px;"></div>
            <span style="font-size:8px;color:rgba(160,205,190,0.45);">Signal</span>
          </div>
          <div id="target-legend" style="display:flex;align-items:center;gap:4px;">
            <div style="width:14px;height:2px;background:rgba(255,175,50,0.8);border-radius:1px;"></div>
            <span style="font-size:8px;color:rgba(255,185,80,0.55);">Target</span>
          </div>
          <button id="shape-toggle" style="background:rgba(0,212,255,0.15);border:1px solid rgba(0,212,255,0.3);color:rgba(0,212,255,0.8);font-family:monospace;font-size:7px;padding:2px 7px;border-radius:3px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;">SHAPE</button>
        </div>
      </div>
      <canvas id="spec-cv" style="flex:1;display:block;width:100%;min-height:0;"></canvas>
    </div>

    <!-- VERTICAL SPLITTER -->
    <div class="splitter splitter-v" id="split-v"></div>

    <!-- RIGHT -->
    <div id="right-panel">

      <!-- VECTORSCOPE -->
      <div id="vs-panel">
        <span class="plbl" style="align-self:flex-start;flex-shrink:0;">Stereo</span>
        <div id="vs-content">
          <canvas id="vs-cv" style="display:block;"></canvas>
          <div id="vs-sub">
          <!-- Correlation bar -->
          <div class="hbar-group">
            <div class="hbar-name">Correlation</div>
            <div class="hbar-row">
              <div class="hbar-track">
                <div class="hbar-center"></div>
                <div class="hbar-ind" id="corr-ind" style="left:50%;"></div>
              </div>
            </div>
            <div class="hbar-ends"><span>-1</span><span>0</span><span>+1</span></div>
          </div>
          <!-- Balance bar -->
          <div class="hbar-group">
            <div class="hbar-name">Balance</div>
            <div class="hbar-row">
              <div class="hbar-track">
                <div class="hbar-center"></div>
                <div class="hbar-ind" id="bal-ind" style="left:50%;"></div>
              </div>
            </div>
            <div class="hbar-ends"><span>L</span><span>C</span><span>R</span></div>
          </div>
        </div>
        </div>
      </div>

      <!-- SPLITTER H1 -->
      <div class="splitter splitter-h" id="split-h1"></div>

      <!-- READOUTS -->
      <div id="meters-panel">
        <div id="lufs-readouts">
          <div class="lr-row">
            <span class="lr-label" style="color:#ffd020;">S</span>
            <span class="lr-value" id="lr-short">---</span>
            <span class="lr-unit">LUFS</span>
          </div>
          <div class="lr-row">
            <span class="lr-label" style="color:#E91E8C;">I</span>
            <span class="lr-value" id="lr-int">---</span>
            <span class="lr-unit">LUFS</span>
          </div>
          <div class="lr-row">
            <span class="lr-label" style="color:#00e090;">Pk</span>
            <span class="lr-value" id="lr-peak">---</span>
            <span class="lr-unit">dBTP</span>
          </div>
          <div class="lr-row">
            <span class="lr-label" style="color:#00d4ff;">RMS</span>
            <span class="lr-value" id="lr-rms">---</span>
            <span class="lr-unit">dBFS</span>
          </div>
        </div>
      </div>

      <!-- SPLITTER H2 -->
      <div class="splitter splitter-h" id="split-h2"></div>

      <!-- FEEDBACK -->
      <div id="fb-panel">
        <div id="fb-arc-area">
          <canvas id="fb-arc-cv" width="80" height="80" style="display:block;"></canvas>
          <div class="fb-score" id="fb-score">--</div>
          <div class="fb-match-lbl">Match</div>
        </div>
        <div id="fb-right">
          <div id="genre-name">Hip-Hop / Trap</div>
          <div id="metrics-container" style="display:flex;flex-direction:column;gap:3px;flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
(function(){
  var DPR = window.devicePixelRatio || 1;
  var juceAvailable = typeof window.__JUCE__ !== 'undefined' && window.__JUCE__ !== null;

  // Minimal JUCE slider state helper
  function getSliderState(name) {
    if (!juceAvailable) return null;
    try {
      var sliders = window.__JUCE__.initialisationData.__juce__sliders;
      if (!sliders || !sliders[name]) return null;
      var s = sliders[name];
      var getNativeFn = function(fnName) {
        try { return window.__JUCE__.backend.getNativeFunction(fnName); }
        catch(e) { return function(){}; }
      };
      return {
        properties: s.properties,
        valueChangedEvent: s.valueChangedEvent,
        getNormalisedValue: function() { return s.properties.normalisedValue || 0; },
        setNormalisedValue: function(v) {
          var dragStart = getNativeFn("sliderDragStarted__" + name);
          var valChanged = getNativeFn("sliderValueChanged__" + name);
          var dragEnd = getNativeFn("sliderDragEnded__" + name);
          dragStart(); valChanged(v); dragEnd();
        }
      };
    } catch(e) { return null; }
  }

  var genreState = getSliderState("target_genre");
  var reactionState = getSliderState("analysis_window");

  // -- Genre Data --
  var genreNames = ['Hip-Hop / Trap','Pop','EDM / Dance','Rock','Lo-Fi','R&B / Soul','Latin','Trance','Bass','House','Techno','Downtempo'];
  var genreData = [
    // 0: Hip-Hop / Trap
    {lufsLo:-11.933,lufsHi:-7.372, rmsLo:-12.699,rmsHi:-7.990, spread:0.141, wlo:0.000, whi:0.089, corrMean:0.9198},
    // 1: Pop
    {lufsLo:-10.570,lufsHi:-7.635, rmsLo:-12.208,rmsHi:-9.177, spread:0.445, wlo:0.057, whi:0.197, corrMean:0.7463},
    // 2: EDM / Dance
    {lufsLo:-8.579,lufsHi:-5.896, rmsLo:-10.029,rmsHi:-8.016, spread:0.460, wlo:0.069, whi:0.194, corrMean:0.7370},
    // 3: Rock
    {lufsLo:-9.833,lufsHi:-8.055, rmsLo:-11.875,rmsHi:-9.902, spread:0.480, wlo:0.056, whi:0.218, corrMean:0.7272},
    // 4: Lo-Fi
    {lufsLo:-14.683,lufsHi:-10.918, rmsLo:-15.916,rmsHi:-12.047, spread:0.314, wlo:0.033, whi:0.146, corrMean:0.8218},
    // 5: R&B / Soul
    {lufsLo:-10.462,lufsHi:-7.937, rmsLo:-12.625,rmsHi:-9.633, spread:0.439, wlo:0.052, whi:0.199, corrMean:0.7496},
    // 6: Latin
    {lufsLo:-9.305,lufsHi:-7.476, rmsLo:-10.896,rmsHi:-9.168, spread:0.290, wlo:0.039, whi:0.126, corrMean:0.8346},
    // 7: Trance
    {lufsLo:-10.086,lufsHi:-7.318, rmsLo:-11.422,rmsHi:-8.490, spread:0.249, wlo:0.030, whi:0.112, corrMean:0.8581},
    // 8: Bass
    {lufsLo:-9.222,lufsHi:-6.296, rmsLo:-10.450,rmsHi:-7.612, spread:0.351, wlo:0.044, whi:0.157, corrMean:0.7994},
    // 9: House
    {lufsLo:-13.416,lufsHi:-8.187, rmsLo:-14.628,rmsHi:-9.370, spread:0.082, wlo:0.000, whi:0.049, corrMean:0.9535},
    // 10: Techno
    {lufsLo:-11.327,lufsHi:-8.081, rmsLo:-12.144,rmsHi:-8.446, spread:0.129, wlo:0.002, whi:0.072, corrMean:0.9271},
    // 11: Downtempo
    {lufsLo:-15.320,lufsHi:-9.885, rmsLo:-17.095,rmsHi:-10.902, spread:0.500, wlo:0.064, whi:0.262, corrMean:0.6743}
  ];

  // -- Analysis State --
  var genre = 0;
  var lufsV = -60, lufsT2 = -60, lufsPk = -60, lufsPkT = 80;
  var rmsV = -60, rmsT2 = -60, rmsPk = -60, rmsPkT = 80, intV = -60;
  var corrV = 0, corrT = 0, widthV = 0, widthT = 0, balV = 0, balT = 0, tSpread = 0.223;
  var fbScores = {dynamics:0, tonality:0, width:0, correlation:0};
  var fbTgts = {dynamics:0, tonality:0, width:0, correlation:0};
  var fbDirs = {dynamics:0, tonality:0, width:0, correlation:0};
  var fbWorstBand = -1;
  var fbSmooth = 0;
  var lufsMomMax = -60;  // True peak LUFS (highest ever, never decays)
  var rmsHoldMax = -60;  // RMS peak hold (highest, reset on new audio)
  var truePeakMax = -144; // True peak dBTP (highest, reset on new audio)
  var wasSilent = true;   // Track silence→audio transition for reset
  var hasReceivedData = false;
  var fbScale = 1;
  var shapeMode = true;
  var SHAPE_REF = -40;

  // -- Spectrum Data --
  var specSpeed = 0.15; // 0 = frozen, 1 = instant
  var FMIN = 10, FMAX = 20000, N = 300;
  var specSig = new Float32Array(N);
  var specSmth = new Float32Array(N);
  var specDisp = new Float32Array(N); // spatially smoothed for display
  var specPeak = new Float32Array(N); // per-band peak hold
  var specPeakDisp = new Float32Array(N); // spatially smoothed peak for display
  var specTLo = new Float32Array(N);

      var bc = s > 75 ? 'rgba(0,215,110,0.8)' : s > 50 ? 'rgba(255,185,35,0.8)' : 'rgba(255,55,35,0.8)';
      var ic = s > 75 ? '\u2713' : s > 50 ? '\u25B2' : '\u2715';
      var dir = fbDirs[def.key] || 0;
      var msg = getFbMessage(def.key, s, dir);
      e.icon.textContent = ic; e.icon.style.color = col; e.icon.style.fontSize = iconSz; e.icon.style.width = iconW;
      e.name.style.fontSize = nameSz; e.name.style.width = nameW;
      e.barW.style.height = barH;
      e.bar.style.width = s+'%'; e.bar.style.background = bc;
      e.pct.textContent = Math.round(s)+'%'; e.pct.style.color = col; e.pct.style.fontSize = pctSz;
      e.msg.textContent = msg; e.msg.style.fontSize = msgSz; e.msg.style.paddingLeft = padL;
    }
  }

  // ===== JUCE EVENT HANDLERS =====

  // Genre parameter: bidirectional binding
  var genreToggleBtn = document.getElementById('genre-toggle-btn');
  var genreBtnLabel = document.getElementById('genre-btn-label');
  var genrePanel = document.getElementById('genre-panel');

  if (genreState && genreState.valueChangedEvent) {
    genreState.valueChangedEvent.addListener(function() {
      var idx = Math.round(genreState.getNormalisedValue() * 11);
      genre = Math.max(0, Math.min(11, idx));
      // Exclusive select from DAW parameter change
      for (var k = 0; k < 12; k++) selectedGenres[k] = false;
      selectedGenres[genre] = true;
      updateGenrePanel();
    });
  }

  // Unified genre panel with dual behavior:
  //   - Click text = exclusive single-select
  //   - Click checkbox = toggle multi-select
  function buildGenrePanel() {
    genrePanel.innerHTML = '';
    for (var gi = 0; gi < genreNames.length; gi++) {
      var row = document.createElement('div');
      row.dataset.gi = gi;
      row.style.cssText = 'display:flex;align-items:center;gap:6px;padding:3px 10px;cursor:pointer;font-size:9px;color:rgba(200,215,235,0.7);font-family:monospace;transition:background 0.1s;';
      // Checkbox for multi-select
      var cb = document.createElement('input');
      cb.type = 'checkbox'; cb.checked = selectedGenres[gi];
      cb.dataset.gi = gi;
      cb.style.cssText = 'width:11px;height:11px;accent-color:#E91E8C;cursor:pointer;flex-shrink:0;';
      cb.addEventListener('change', function(e) {
        e.stopPropagation();
        var idx = +this.dataset.gi;
        selectedGenres[idx] = this.checked;
        // Ensure at least one genre is selected
        var anySelected = false;
        for (var k = 0; k < 12; k++) if (selectedGenres[k]) anySelected = true;
        if (!anySelected) { selectedGenres[genre] = true; this.checked = (idx === genre); }
        updateGenreBtnLabel();
      });
      // Text label for single-select
      var lbl = document.createElement('span');
      lbl.textContent = genreNames[gi];
      lbl.style.cssText = 'flex:1;user-select:none;';
      lbl.dataset.gi = gi;
      lbl.addEventListener('click', function(e) {
        e.stopPropagation();
        var idx = +this.dataset.gi;
        genre = idx;
        if (genreState) genreState.setNormalisedValue(genre / 11);
        // Exclusive select: deselect all, select only this one
        for (var k = 0; k < 12; k++) selectedGenres[k] = false;
        selectedGenres[idx] = true;
        updateGenrePanel();
        genrePanel.style.display = 'none';
      });
      // Hover effect
      row.addEventListener('mouseenter', function() { this.style.background = 'rgba(255,255,255,0.06)'; });
      row.addEventListener('mouseleave', function() { this.style.background = 'transparent'; });
      row.appendChild(cb);
      row.appendChild(lbl);
      genrePanel.appendChild(row);
    }
  }
  function updateGenrePanel() {
    var cbs = genrePanel.querySelectorAll('input[type=checkbox]');
    for (var ci = 0; ci < cbs.length; ci++) cbs[ci].checked = selectedGenres[ci];
    updateGenreBtnLabel();
  }
  function updateGenreBtnLabel() {
    var count = 0, firstIdx = -1;
    for (var gi = 0; gi < 12; gi++) {
      if (selectedGenres[gi]) {
        count++;
        if (firstIdx === -1) firstIdx = gi;
      }
    }
    if (count <= 1) {
      genreBtnLabel.textContent = genreNames[firstIdx >= 0 ? firstIdx : genre];
      genreToggleBtn.style.borderColor = 'rgba(255,255,255,0.1)';
    } else {
      genreBtnLabel.textContent = count + ' Genres Mixed';
      genreToggleBtn.style.borderColor = 'rgba(233,30,140,0.4)';
    }
  }
  buildGenrePanel();
  updateGenreBtnLabel();
  genreToggleBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    genrePanel.style.display = genrePanel.style.display === 'none' ? 'block' : 'none';
  });
  document.addEventListener('click', function(e) {
    if (!genrePanel.contains(e.target) && e.target !== genreToggleBtn) {
      genrePanel.style.display = 'none';
    }
  });

  // Reaction Time slider — bound to JUCE analysis_window parameter
  // Parameter: 0.5s (fast) to 10.0s (slow). Slider: 0 (slow) to 100 (fast).
  // Mapping: normalised 0.0=0.5s=fast=slider100, normalised 1.0=10.0s=slow=slider0
  var speedSlider = document.getElementById('speed-sl');
  var speedVal = document.getElementById('speed-val');
  function updateSpeedLabel(val) {
    specSpeed = val / 100.0;
    if (val >= 95) speedVal.textContent = 'Instant';
    else if (val >= 70) speedVal.textContent = 'Fast';
    else if (val >= 40) speedVal.textContent = 'Medium';
    else if (val >= 15) speedVal.textContent = 'Slow';
    else speedVal.textContent = 'Hold';
  }
  function normToSlider(norm) { return Math.round((1.0 - norm) * 100); }
  function sliderToNorm(val) { return 1.0 - (val / 100.0); }
  speedSlider.addEventListener('input', function(e) {
    var val = parseInt(e.target.value);
    updateSpeedLabel(val);
    if (reactionState) reactionState.setNormalisedValue(sliderToNorm(val));
  });
  // Sync from JUCE parameter on load
  if (reactionState) {
    try {
      var initSlider = normToSlider(reactionState.getNormalisedValue());
      speedSlider.value = initSlider;
      updateSpeedLabel(initSlider);
    } catch(e) { updateSpeedLabel(parseInt(speedSlider.value)); }
  } else {
    updateSpeedLabel(parseInt(speedSlider.value));
  }

  // Shape/Level toggle
  var shapeToggleBtn = document.getElementById('shape-toggle');
  var targetLegend = document.getElementById('target-legend');
  shapeToggleBtn.addEventListener('click', function() {
    shapeMode = !shapeMode;
    shapeToggleBtn.textContent = shapeMode ? 'SHAPE' : 'LEVEL';
    shapeToggleBtn.style.background = shapeMode ? 'rgba(0,212,255,0.15)' : 'rgba(255,255,255,0.06)';
    shapeToggleBtn.style.borderColor = shapeMode ? 'rgba(0,212,255,0.3)' : 'rgba(255,255,255,0.1)';
    shapeToggleBtn.style.color = shapeMode ? 'rgba(0,212,255,0.8)' : 'rgba(160,185,220,0.4)';
    targetLegend.style.display = shapeMode ? 'flex' : 'none';
  });

  // Send button
  var sendBtn = document.getElementById('btn_send_snip');
  var statusLed = document.getElementById('status-led');
  var statusText = document.getElementById('status-text');

  sendBtn.addEventListener('click', function() {
    sendBtn.classList.add('sending');
    sendBtn.textContent = 'Sending...';
    statusLed.style.background = '#FFD600';
    statusLed.style.boxShadow = '0 0 6px rgba(255,214,0,0.6)';
    statusText.textContent = 'Sending to Meetsnip.com...';
    if (juceAvailable) {
      try { window.__JUCE__.backend.emitEvent("sendToSnip", {}); }
      catch(e) { /* fallback: simulate */ simulateSendResult(); }
    } else {
      simulateSendResult();
    }
  });

  function simulateSendResult() {
    setTimeout(function() {
      handleSendResult({success: true});
    }, 1500);
  }

  function handleSendResult(data) {
    if (data && data.success) {
      sendBtn.classList.remove('sending'); sendBtn.classList.add('sent'); sendBtn.textContent = 'Sent \u2713';
      statusLed.style.background = '#00e676'; statusLed.style.boxShadow = '0 0 6px rgba(0,230,118,0.6)';
      statusText.textContent = 'Analysis sent successfully';
      setTimeout(function() {
        sendBtn.classList.remove('sent'); sendBtn.textContent = 'Send to Meetsnip';
        statusText.textContent = 'Ready';
      }, 3000);
    } else {
      sendBtn.classList.remove('sending'); sendBtn.textContent = 'Send to Meetsnip';
      statusLed.style.background = '#FF1744'; statusLed.style.boxShadow = '0 0 6px rgba(255,23,68,0.6)';
      statusText.textContent = data && data.error ? 'Failed: ' + data.error : 'Send failed';
      setTimeout(function() {
        statusLed.style.background = '#00e676'; statusLed.style.boxShadow = '0 0 6px rgba(0,230,118,0.6)';
        statusText.textContent = 'Ready';
      }, 3000);
    }
  }

  // Listen for C++ events (guarded)
  if (juceAvailable && window.__JUCE__.backend) {
    try {
      window.__JUCE__.backend.addEventListener("sendResult", function(data) {
        handleSendResult(data);
      });

      window.__JUCE__.backend.addEventListener("analysisUpdate", function(d) {
        if (!d) return;
        hasReceivedData = true;

        if (d.lufsShort !== undefined) lufsT2 = d.lufsShort;
        if (d.lufsInt !== undefined) intV = d.lufsInt;
        if (d.rms !== undefined) rmsT2 = d.rms;
        if (d.correlation !== undefined) corrT = d.correlation;
        if (d.width !== undefined) widthT = d.width;
        if (d.balance !== undefined) balT = d.balance;
        if (d.truePeak !== undefined) {
          if (d.truePeak > truePeakMax) truePeakMax = d.truePeak;
        }

        if (d.spectrum && d.spectrum.length === N) {
          for (var si = 0; si < N; si++) specSig[si] = d.spectrum[si];
        }

        if (d.feedback) {
          if (d.feedback.dynamics !== undefined) fbTgts.dynamics = d.feedback.dynamics;
          if (d.feedback.tonality !== undefined) fbTgts.tonality = d.feedback.tonality;
          if (d.feedback.width !== undefined) fbTgts.width = d.feedback.width;
          if (d.feedback.correlation !== undefined) fbTgts.correlation = d.feedback.correlation;
          if (d.feedback.dynamicsDir !== undefined) fbDirs.dynamics = d.feedback.dynamicsDir;
          if (d.feedback.tonalityDir !== undefined) fbDirs.tonality = d.feedback.tonalityDir;
          if (d.feedback.widthDir !== undefined) fbDirs.width = d.feedback.widthDir;
          if (d.feedback.correlationDir !== undefined) fbDirs.correlation = d.feedback.correlationDir;
          if (d.feedback.tonalityWorstBand !== undefined) fbWorstBand = d.feedback.tonalityWorstBand;
        }

      });
    } catch(e) {
      console.warn("SNIP Bridge: Failed to set up JUCE event listeners:", e);
    }
  }

  // ===== SETUP & MAIN LOOP =====

  function updateFbScale() {
    var fb = document.getElementById('fb-panel');
    if (!fb) return;
    var h = fb.offsetHeight, w = fb.offsetWidth;
    fbScale = Math.min(h / 120, w / 300);
    fbScale = Math.max(0.5, Math.min(2.5, fbScale));
    // Scale padding based on available height
    var pad = Math.max(4, Math.round(10 * fbScale));
    fb.style.padding = pad + 'px ' + Math.round(14 * Math.min(1, fbScale)) + 'px';
    fb.style.gap = Math.max(4, Math.round(10 * fbScale)) + 'px';
    // Constrain arc to available content height (panel height minus padding)
    var contentH = h - pad * 2;
    var arcSz = Math.round(80 * fbScale);
    // Reserve space for: score text + match label + gaps (2px * 2)
    var scoreSz = Math.round(15 * fbScale);
    var matchSz = Math.round(6 * fbScale);
    var reservedH = scoreSz + matchSz + 6; // 6px for gaps + margin
    var maxArc = Math.max(20, contentH - reservedH);
    arcSz = Math.min(arcSz, maxArc);
    fbArcCv.width = arcSz; fbArcCv.height = arcSz;
    fbArcCv.style.width = arcSz + 'px'; fbArcCv.style.height = arcSz + 'px';
    // Scale score text
    var scoreEl = document.getElementById('fb-score');
    if (scoreEl) scoreEl.style.fontSize = Math.round(15 * fbScale) + 'px';
    // Scale/hide match label at tiny sizes
    var matchLbl = fb.querySelector('.fb-match-lbl');
    if (matchLbl) {
      if (contentH < 50) { matchLbl.style.display = 'none'; }
      else { matchLbl.style.display = ''; matchLbl.style.fontSize = Math.round(6 * fbScale) + 'px'; }
    }
    // Hide score text at very tiny sizes
    if (scoreEl) { scoreEl.style.display = contentH < 35 ? 'none' : ''; }
  }

  function setupAll() {
    setupSpec(); setupVS();
    updateFbScale();
  }

  var setupRetries = 0;
  function trySetup() {
    setupAll();
    setupRetries++;
    if ((!specCv.offsetWidth || !specCv.offsetHeight) && setupRetries < 20) {
      setTimeout(trySetup, 100);
    }
  }

  setTimeout(trySetup, 60);
  window.addEventListener('resize', function() { setTimeout(setupAll, 30); });

  function tick() {
    var selHash = selectedGenres.join(',');
    if (genre !== lastGenre || selHash !== lastSelectedHash) {
      buildSpecTargets(); lastGenre = genre; lastSelectedHash = selHash;
    }

    // Asymmetric spectrum smoothing: fast attack (captures peaks), speed-controlled decay
    var attackAlpha = 0.65; // always responsive to new peaks
    var decayAlpha = specSpeed * 0.4; // decay controlled by speed slider
    var peakDecay = 0.15 + specSpeed * 0.6; // dB/frame: slow speed = very slow peak decay
    for (var ti = 0; ti < N; ti++) {
      var diff = specSig[ti] - specSmth[ti];
      if (diff > 0) {
        specSmth[ti] += diff * attackAlpha; // fast attack — energy builds up
      } else {
        specSmth[ti] += diff * decayAlpha; // speed-controlled decay
      }
      // Per-band peak hold (slow decay)
      if (specSmth[ti] > specPeak[ti]) {
        specPeak[ti] = specSmth[ti];
      } else {
        specPeak[ti] -= peakDecay;
      }
    }
    // Spatial smooth for display (sigma=5 for organic Prism-like curves)
    var gsDisp = gaussSmooth(specSmth, 5);
    specDisp.set(gsDisp);
    var gsPk = gaussSmooth(specPeak, 5);
    specPeakDisp.set(gsPk);
    drawSpec();

    // Dynamics: smooth toward targets
    lufsV += (lufsT2-lufsV)*.15;
    rmsV += (rmsT2-rmsV)*.15;
    if (lufsV > lufsPk) { lufsPk = lufsV; lufsPkT = 80; }
    else if (--lufsPkT <= 0) lufsPk -= .05;
    if (rmsV > rmsPk) { rmsPk = rmsV; rmsPkT = 80; }
    else if (--rmsPkT <= 0) rmsPk -= .05;

    var tgt = genreData[genre];
    var inL = lufsV >= tgt.lufsLo && lufsV <= tgt.lufsHi;
    var inR = rmsV >= tgt.rmsLo && rmsV <= tgt.rmsHi;

    /* ── LUFS readouts ── */
    // RMS + Peak: hold highest value, reset when music starts again after silence
    var isSilent = rmsV <= -55;
    if (isSilent) { wasSilent = true; }
    else {
      if (wasSilent) { rmsHoldMax = -60; truePeakMax = -144; wasSilent = false; } // reset on new audio
      if (rmsV > rmsHoldMax) rmsHoldMax = rmsV;
    }

    var lrS = document.getElementById('lr-short');
    var lrI = document.getElementById('lr-int');
    var lrP = document.getElementById('lr-peak');
    var lrR = document.getElementById('lr-rms');
    lrS.textContent = lufsV > -55 ? lufsV.toFixed(1) : '---';
    lrS.style.color = lufsV <= -55 ? '#555' : inL ? '#00e090' : lufsV > tgt.lufsHi ? '#ff4422' : '#ffd020';
    lrI.textContent = intV > -55 ? intV.toFixed(1) : '---';
    lrI.style.color = intV <= -55 ? '#555' : '#E91E8C';
    lrP.textContent = truePeakMax > -144 ? truePeakMax.toFixed(1) : '---';
    lrP.style.color = truePeakMax <= -144 ? '#555' : truePeakMax > 0 ? '#ff4422' : '#00e090';
    lrR.textContent = rmsHoldMax > -55 ? rmsHoldMax.toFixed(1) : '---';
    lrR.style.color = rmsHoldMax <= -55 ? '#555' : inR ? '#00e090' : rmsHoldMax > tgt.rmsHi ? '#ff4422' : '#00d4ff';
    // Stereo: smooth toward targets
    corrV += (corrT-corrV)*.04;
    widthV += (widthT-widthV)*0.08; // fixed medium speed, independent of speed fader
    drawVS();

    // Correlation & Balance bars: smooth + update indicator position
    balV += (balT-balV)*.08;
    // corrV already smoothed above — map -1..+1 → 0..100%
    document.getElementById('corr-ind').style.left = ((corrV+1)*50)+'%';
    document.getElementById('bal-ind').style.left = ((balV+1)*50)+'%';

    // Feedback: smooth scores
    var keys = ['dynamics','tonality','width','correlation'];
    for (var ki = 0; ki < keys.length; ki++) {
      fbScores[keys[ki]] += (fbTgts[keys[ki]]-fbScores[keys[ki]])*.04;
    }
    var overall = Math.round((fbScores.dynamics+fbScores.tonality+fbScores.width+fbScores.correlation)/4);
    fbSmooth += (overall-fbSmooth)*.04;
    var sc = Math.round(fbSmooth), arcCol = drawFbArc(fbSmooth);
    var fbScoreEl = document.getElementById('fb-score');
    fbScoreEl.textContent = hasReceivedData ? sc : '--';
    fbScoreEl.style.color = arcCol;
    fbScoreEl.style.fontSize = Math.round(15 * fbScale) + 'px';
    var genreNameEl = document.getElementById('genre-name');
    var activeCount = 0, activeName = '';
    for (var gn = 0; gn < 12; gn++) {
      if (selectedGenres[gn]) { activeCount++; activeName = genreNames[gn]; }
    }
    genreNameEl.textContent = activeCount > 1 ? activeCount + ' Genres Mixed' : (activeName || genreNames[genre]);
    genreNameEl.style.fontSize = Math.round(9 * fbScale) + 'px';
    renderMetrics();

    requestAnimationFrame(tick);
  }

  // ===== RESIZABLE SPLITTERS =====
  var splitV = document.getElementById('split-v');
  var splitH1 = document.getElementById('split-h1');
  var splitH2 = document.getElementById('split-h2');
  var bodyEl = document.querySelector('.body');
  var specPanel = document.getElementById('spec-panel');
  var rightPanel = document.getElementById('right-panel');
  var vsPanelEl = document.getElementById('vs-panel');
  var metersPanelEl = document.getElementById('meters-panel');
  var fbPanelEl = document.getElementById('fb-panel');
  var draggingSplit = null;
  var rafPending = false;

  function startDrag(e) {
    e.preventDefault();
    draggingSplit = e.currentTarget.id;
    e.currentTarget.classList.add('dragging');
    document.body.style.cursor = draggingSplit === 'split-v' ? 'col-resize' : 'row-resize';
    document.body.style.userSelect = 'none';
    document.body.style.webkitUserSelect = 'none';
  }

  splitV.addEventListener('mousedown', startDrag);
  splitH1.addEventListener('mousedown', startDrag);
  splitH2.addEventListener('mousedown', startDrag);

  document.addEventListener('mousemove', function(e) {
    if (!draggingSplit) return;
    if (rafPending) return;
    rafPending = true;
    requestAnimationFrame(function() {
      rafPending = false;
      if (!draggingSplit) return;
      if (draggingSplit === 'split-v') {
        var rect = bodyEl.getBoundingClientRect();
        var totalW = rect.width;
        var pct = ((e.clientX - rect.left) / totalW) * 100;
        var minPct = Math.max(15, (120 / totalW) * 100);
        var maxPct = Math.min(85, ((totalW - 125) / totalW) * 100);
        pct = Math.max(minPct, Math.min(maxPct, pct));
        specPanel.style.width = pct + '%';
      } else if (draggingSplit === 'split-h1') {
        // Between vectorscope and meters
        var rect = rightPanel.getBoundingClientRect();
        var y = e.clientY - rect.top;
        y = Math.max(60, Math.min(rect.height - 135, y));
        vsPanelEl.style.flex = 'none';
        vsPanelEl.style.height = y + 'px';
      } else if (draggingSplit === 'split-h2') {
        // Between meters and feedback
        var rect = rightPanel.getBoundingClientRect();
        var fbH = rect.height - (e.clientY - rect.top);
        fbH = Math.max(60, Math.min(rect.height - 135, fbH));
        fbPanelEl.style.flex = 'none';
        fbPanelEl.style.height = fbH + 'px';
      }
      setupAll();
    });
  });

  document.addEventListener('mouseup', function() {
    if (!draggingSplit) return;
    var el = document.getElementById(draggingSplit);
    if (el) el.classList.remove('dragging');
    draggingSplit = null;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    document.body.style.webkitUserSelect = '';
    setupAll();
  });

  setTimeout(tick, 120);
})();
</script>
</body>
