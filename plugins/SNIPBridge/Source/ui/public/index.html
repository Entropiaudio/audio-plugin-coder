<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNIP Bridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #040608;
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: monospace;
    }

    #plugin {
      width: 100vw;
      height: 100vh;
      background: #080c14;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* -- HEADER -- */
    .header {
      height: 40px;
      background: #0a0e1a;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      padding: 0 20px;
      flex-shrink: 0;
      gap: 16px;
    }
    .logo { font-size: 14px; font-weight: 700; letter-spacing: 3px; color: #fff; }
    .logo span { color: #E91E8C; text-shadow: 0 0 14px rgba(233,30,140,0.4); }
    .hsel {
      background: #0d1120; color: rgba(160,185,220,0.75);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
      padding: 3px 8px; font-family: monospace; font-size: 9px;
      outline: none; cursor: pointer;
    }
    .send-btn {
      background: linear-gradient(180deg,rgba(255,255,255,0.1) 0%,transparent 40%,rgba(0,0,0,0.15) 100%),
                  linear-gradient(180deg,#F02A96,#C4167A);
      color: #fff; font-family: monospace; font-weight: 700; font-size: 11px;
      letter-spacing: 1.5px; text-transform: uppercase; border: none;
      border-top: 1px solid rgba(255,255,255,0.18); border-radius: 5px;
      padding: 7px 22px; cursor: pointer;
      box-shadow: 0 2px 10px rgba(233,30,140,0.3);
      transition: filter 0.15s, box-shadow 0.15s;
    }
    .send-btn:hover { filter: brightness(1.15); box-shadow: 0 2px 18px rgba(233,30,140,0.5); }
    .send-btn.sending { animation: pulse-glow 1.2s ease-in-out infinite; }
    .send-btn.sent { background: linear-gradient(180deg,rgba(255,255,255,0.1) 0%,transparent 40%,rgba(0,0,0,0.15) 100%), linear-gradient(180deg,#00F08A,#00C864); animation: none; }
    @keyframes pulse-glow {
      0%,100% { box-shadow: 0 2px 10px rgba(233,30,140,0.3); }
      50% { box-shadow: 0 2px 24px rgba(233,30,140,0.6), 0 0 40px rgba(233,30,140,0.2); }
    }
    .plbl { font-size: 8px; letter-spacing: 2.5px; color: rgba(160,185,220,0.38); text-transform: uppercase; }

    /* -- BODY -- */
    .body { flex: 1; display: flex; overflow: hidden; }

    /* -- SPECTRUM -- */
    #spec-panel {
      width: 50%; min-width: 120px; background: #0d1018;
      display: flex; flex-direction: column; padding: 10px 12px 8px;
      flex-shrink: 0;
    }

    /* -- SPLITTERS -- */
    .splitter { background: rgba(255,255,255,0.04); flex-shrink: 0; position: relative; z-index: 10; }
    .splitter:hover { background: rgba(233,30,140,0.25); }
    .splitter:active, .splitter.dragging { background: rgba(233,30,140,0.4); }
    .splitter-v { width: 5px; cursor: col-resize; }
    .splitter-h { height: 5px; cursor: row-resize; }

    /* -- RIGHT PANEL -- */
    #right-panel { flex: 1; display: flex; flex-direction: column; min-width: 120px; overflow: hidden; }

    /* -- VECTORSCOPE PANEL -- */
    #vs-panel {
      display: flex; flex-direction: column; align-items: center;
      padding: 8px 12px; background: #0d1018; min-height: 60px;
      overflow: hidden; flex: 2; min-width: 0;
    }
    #vs-sub { display: flex; gap: 14px; justify-content: center; padding: 5px 4px 0; width: 100%; }
    .st-readout { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .st-lbl { font-size: 7px; letter-spacing: 1.5px; color: rgba(140,190,220,0.38); text-transform: uppercase; }
    .st-val { font-size: 13px; font-weight: 600; color: #00d4ff; text-shadow: 0 0 8px rgba(0,200,255,0.4); letter-spacing: -0.5px; }
    .wbar-wrap { position: relative; height: 4px; background: rgba(0,0,0,0.5); border-radius: 2px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
    .wbar-l { position: absolute; right: 50%; top: 0; bottom: 0; background: linear-gradient(to left,rgba(0,180,255,0.75),rgba(0,100,200,0.25)); border-radius: 3px 0 0 3px; }
    .wbar-r { position: absolute; left: 50%; top: 0; bottom: 0; background: linear-gradient(to right,rgba(0,180,255,0.75),rgba(0,100,200,0.25)); border-radius: 0 3px 3px 0; }
    .wbar-c { position: absolute; left: 50%; top: -1px; bottom: -1px; width: 1px; background: rgba(255,255,255,0.18); transform: translateX(-50%); }
    .wbar-tgt { position: absolute; top: 0; bottom: 0; background: rgba(255,170,40,0.12); border-left: 1px solid rgba(255,175,50,0.45); border-right: 1px solid rgba(255,175,50,0.45); }
    .wbar-lcr { display: flex; justify-content: space-between; margin-top: 2px; }
    .wbar-lcr span { font-size: 7px; color: rgba(140,190,220,0.28); }

    /* -- METERS PANEL -- */
    #meters-panel { display: flex; flex-direction: row; background: #0d1018; min-height: 60px; overflow: hidden; flex: 1; }
    #lufs-readouts { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 6px; padding: 10px 16px; min-width: 0; overflow: hidden; }
    .lr-row { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.06); border-radius: 4px; flex: 1; min-height: 0; }
    .lr-label { font-size: 13px; font-weight: 700; min-width: 30px; }
    .lr-value { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; margin-left: auto; color: rgba(230,240,250,0.85); }
    .lr-unit { font-size: 9px; color: rgba(160,185,220,0.38); letter-spacing: 0.5px; }

    /* -- FEEDBACK -- */
    #fb-panel { display: flex; flex-direction: row; gap: 10px; padding: 10px 14px; flex: 1; min-height: 0; overflow: hidden; background: #0d1018; align-items: stretch; }
    #fb-arc-area { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; min-height: 0; overflow: hidden; }
    .fb-score { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; margin-top: -4px; }
    .fb-match-lbl { font-size: 7px; letter-spacing: 1.5px; color: rgba(160,185,220,0.35); text-transform: uppercase; }
    #fb-right { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; gap: 4px; min-width: 0; min-height: 0; overflow: hidden; }
    #genre-name { font-size: 11px; font-weight: 600; color: rgba(200,215,240,0.8); margin-bottom: 2px; flex-shrink: 0; }
    .mrow { display: flex; flex-direction: column; gap: 2px; }
    .mtop { display: flex; align-items: center; gap: 5px; }
    .micon { font-size: 9px; width: 12px; text-align: center; font-weight: 700; }
    .mname { font-size: 9px; color: rgba(200,215,235,0.6); width: 62px; }
    .mbarw { flex: 1; height: 3px; background: rgba(0,0,0,0.5); border-radius: 2px; overflow: hidden; }
    .mbar { height: 100%; border-radius: 2px; transition: width 400ms ease; }
    .mpct { font-size: 9px; font-weight: 600; min-width: 28px; text-align: right; }
    .mmsg { padding-left: 17px; font-size: 8px; color: rgba(140,160,195,0.5); line-height: 1.4; word-wrap: break-word; overflow-wrap: break-word; }
  </style>
</head>
<body>
<div id="plugin">

  <!-- HEADER -->
  <div class="header">
    <div style="display:flex;flex-direction:column;gap:0;">
      <div class="logo">SNIP <span>BRIDGE</span></div>
      <span style="font-size:7px;letter-spacing:1.5px;color:rgba(160,185,220,0.28);margin-top:-2px;">v0.1.0</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px;margin-left:12px;">
      <span class="plbl">Genre</span>
      <select class="hsel" id="main-genre">
        <option value="0">Hip-Hop / Trap</option>
        <option value="1">Pop</option>
        <option value="2">EDM / Dance</option>
        <option value="3">Rock</option>
        <option value="4">Lo-Fi</option>
        <option value="5">R&B / Soul</option>
        <option value="6">Latin</option>
        <option value="7">Trance</option>
        <option value="8">Bass</option>
        <option value="9">House</option>
        <option value="10">Techno</option>
        <option value="11">Downtempo</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <span class="plbl">Speed</span>
      <input type="range" min="0" max="100" step="1" value="85" id="speed-sl"
        style="-webkit-appearance:none;width:70px;height:3px;background:#1a1e2e;border-radius:2px;outline:none;">
      <span id="speed-val" style="font-size:9px;color:#00d4ff;min-width:38px;">Fast</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
      <div id="status-led" style="width:6px;height:6px;border-radius:50%;background:#00e676;box-shadow:0 0 6px rgba(0,230,118,0.6);"></div>
      <span id="status-text" style="font-size:9px;color:rgba(160,185,220,0.4);">Ready</span>
    </div>
    <button class="send-btn" id="btn_send_snip">Send to Meetsnip</button>
  </div>

  <!-- BODY -->
  <div class="body">

    <!-- SPECTRUM -->
    <div id="spec-panel">
      <div style="display:flex;align-items:center;margin-bottom:6px;gap:12px;">
        <span class="plbl">Spectrum</span>
        <div style="display:flex;align-items:center;gap:10px;margin-left:auto;">
          <div style="display:flex;align-items:center;gap:4px;">
            <div style="width:14px;height:2px;background:linear-gradient(90deg,#ff6030,#ffd028,#50e650,#00dcc8,#1e96ff,#b450ff);border-radius:1px;"></div>
            <span style="font-size:8px;color:rgba(160,205,190,0.45);">Signal</span>
          </div>
          <div style="display:flex;align-items:center;gap:4px;">
            <div style="width:14px;height:2px;background:rgba(255,175,50,0.8);border-radius:1px;"></div>
            <span style="font-size:8px;color:rgba(255,185,80,0.55);">Target</span>
          </div>
          <button id="shape-toggle" style="background:rgba(0,212,255,0.15);border:1px solid rgba(0,212,255,0.3);color:rgba(0,212,255,0.8);font-family:monospace;font-size:7px;padding:2px 7px;border-radius:3px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;">SHAPE</button>
        </div>
      </div>
      <canvas id="spec-cv" style="flex:1;display:block;width:100%;min-height:0;"></canvas>
    </div>

    <!-- VERTICAL SPLITTER -->
    <div class="splitter splitter-v" id="split-v"></div>

    <!-- RIGHT -->
    <div id="right-panel">

      <!-- VECTORSCOPE -->
      <div id="vs-panel">
        <span class="plbl" style="align-self:flex-start;margin-bottom:5px;">Stereo</span>
        <canvas id="vs-cv" style="display:block;"></canvas>
        <div id="vs-sub">
          <div class="st-readout">
            <span class="st-lbl">Corr</span>
            <span class="st-val" id="corr-val">---</span>
          </div>
          <div class="st-readout" style="flex:1;min-width:80px;">
            <span class="st-lbl">Width</span>
            <span class="st-val" id="width-val">---</span>
            <div style="width:100%;margin-top:3px;">
              <div class="wbar-wrap">
                <div class="wbar-tgt" id="wbar-tgt"></div>
                <div class="wbar-l" id="wbar-l"></div>
                <div class="wbar-r" id="wbar-r"></div>
                <div class="wbar-c"></div>
              </div>
              <div class="wbar-lcr"><span>L</span><span>C</span><span>R</span></div>
            </div>
          </div>
        </div>
      </div>

      <!-- SPLITTER H1 -->
      <div class="splitter splitter-h" id="split-h1"></div>

      <!-- READOUTS -->
      <div id="meters-panel">
        <div id="lufs-readouts">
          <div class="lr-row">
            <span class="lr-label" style="color:#ffd020;">S</span>
            <span class="lr-value" id="lr-short">---</span>
            <span class="lr-unit">LUFS</span>
          </div>
          <div class="lr-row">
            <span class="lr-label" style="color:#E91E8C;">I</span>
            <span class="lr-value" id="lr-int">---</span>
            <span class="lr-unit">LUFS</span>
          </div>
          <div class="lr-row">
            <span class="lr-label" style="color:#00e090;">Pk</span>
            <span class="lr-value" id="lr-peak">---</span>
            <span class="lr-unit">LUFS</span>
          </div>
          <div class="lr-row">
            <span class="lr-label" style="color:#00d4ff;">RMS</span>
            <span class="lr-value" id="lr-rms">---</span>
            <span class="lr-unit">dBFS</span>
          </div>
        </div>
      </div>

      <!-- SPLITTER H2 -->
      <div class="splitter splitter-h" id="split-h2"></div>

      <!-- FEEDBACK -->
      <div id="fb-panel">
        <div id="fb-arc-area">
          <canvas id="fb-arc-cv" width="80" height="80" style="display:block;"></canvas>
          <div class="fb-score" id="fb-score">--</div>
          <div class="fb-match-lbl">Match</div>
        </div>
        <div id="fb-right">
          <div id="genre-name">Hip-Hop / Trap</div>
          <div id="metrics-container" style="display:flex;flex-direction:column;gap:6px;flex:1;min-height:0;overflow:hidden;"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
(function(){
  var DPR = window.devicePixelRatio || 1;
  var juceAvailable = typeof window.__JUCE__ !== 'undefined' && window.__JUCE__ !== null;

  // Minimal JUCE slider state helper
  function getSliderState(name) {
    if (!juceAvailable) return null;
    try {
      var sliders = window.__JUCE__.initialisationData.__juce__sliders;
      if (!sliders || !sliders[name]) return null;
      var s = sliders[name];
      var getNativeFn = function(fnName) {
        try { return window.__JUCE__.backend.getNativeFunction(fnName); }
        catch(e) { return function(){}; }
      };
      return {
        properties: s.properties,
        valueChangedEvent: s.valueChangedEvent,
        getNormalisedValue: function() { return s.properties.normalisedValue || 0; },
        setNormalisedValue: function(v) {
          var dragStart = getNativeFn("sliderDragStarted__" + name);
          var valChanged = getNativeFn("sliderValueChanged__" + name);
          var dragEnd = getNativeFn("sliderDragEnded__" + name);
          dragStart(); valChanged(v); dragEnd();
        }
      };
    } catch(e) { return null; }
  }

  var genreState = getSliderState("target_genre");

  // -- Genre Data --
  var genreNames = ['Hip-Hop / Trap','Pop','EDM / Dance','Rock','Lo-Fi',
                     'R&B / Soul','Latin','Trance','Bass','House','Techno','Downtempo'];
  var genreData = [
    {lufsLo:-11.584,lufsHi:-7.086, rmsLo:-12.602,rmsHi:-7.782,  spread:0.28, wlo:0.000, whi:0.110},
    {lufsLo:-11.005,lufsHi:-8.060, rmsLo:-12.856,rmsHi:-9.802,  spread:0.66, wlo:0.069, whi:0.252},
    {lufsLo:-7.735, lufsHi:-5.715, rmsLo:-9.432, rmsHi:-7.689,  spread:0.51, wlo:0.060, whi:0.176},
    {lufsLo:-17.185,lufsHi:-10.665,rmsLo:-19.058,rmsHi:-12.512, spread:0.57, wlo:0.093, whi:0.172},
    {lufsLo:-15.049,lufsHi:-11.062,rmsLo:-16.511,rmsHi:-12.268, spread:0.47, wlo:0.053, whi:0.161},
    {lufsLo:-10.126,lufsHi:-7.754, rmsLo:-12.196,rmsHi:-9.367,  spread:0.39, wlo:0.052, whi:0.161},
    {lufsLo:-10.326,lufsHi:-7.257, rmsLo:-11.866,rmsHi:-8.210,  spread:0.18, wlo:0.000, whi:0.049},
    {lufsLo:-9.244, lufsHi:-7.129, rmsLo:-10.176,rmsHi:-8.063,  spread:0.32, wlo:0.002, whi:0.124},
    {lufsLo:-10.819,lufsHi:-6.990, rmsLo:-12.267,rmsHi:-7.956,  spread:0.41, wlo:0.038, whi:0.137},
    {lufsLo:-13.416,lufsHi:-8.187, rmsLo:-14.628,rmsHi:-9.370,  spread:0.67, wlo:0.064, whi:0.262},
    {lufsLo:-11.304,lufsHi:-8.123, rmsLo:-12.090,rmsHi:-8.461,  spread:0.23, wlo:0.001, whi:0.071},
    {lufsLo:-15.320,lufsHi:-9.885, rmsLo:-17.095,rmsHi:-10.902, spread:0.67, wlo:0.064, whi:0.262},
  ];

  // -- Analysis State --
  var genre = 0;
  var lufsV = -60, lufsT2 = -60, lufsPk = -60, lufsPkT = 80;
  var rmsV = -60, rmsT2 = -60, rmsPk = -60, rmsPkT = 80, intV = -60;
  var corrV = 0, corrT = 0, widthV = 0, widthT = 0, tSpread = 0.42;
  var fbScores = {dynamics:0, tonality:0, width:0, correlation:0};
  var fbTgts = {dynamics:0, tonality:0, width:0, correlation:0};
  var fbSmooth = 0;
  var lufsMomMax = -60;
  var hasReceivedData = false;
  var fbScale = 1;
  var shapeMode = true;
  var SHAPE_REF = -40;

  // -- Spectrum Data --
  var specSpeed = 0.85; // 0 = frozen, 1 = instant
  var FMIN = 10, FMAX = 20000, N = 300;
  var specSig = new Float32Array(N);
  var specSmth = new Float32Array(N);
  var specTLo = new Float32Array(N);
  var specTHi = new Float32Array(N);

  // specKP: spectral keypoints [freq, meanDb, stdDevDb] from SNIP Reference Analyzer
  // Band centers: Sub~40Hz, Low~160Hz, LMid~500Hz, Mid~2kHz, HMid~6kHz, High~14kHz
  var specKP = [
    // Hip-Hop / Trap
    [[10,-0.2,9.4],[40,-0.2,9.4],[160,-1.0,5.1],[500,-6.1,3.7],[2000,-17.2,4.7],[6000,-25.3,5.5],[14000,-35.0,5.9],[20000,-35.0,5.9]],
    // Pop
    [[10,-4.1,8.0],[40,-4.1,8.0],[160,0.3,4.1],[500,-5.6,2.9],[2000,-19.1,5.0],[6000,-29.8,6.0],[14000,-39.0,5.7],[20000,-39.0,5.7]],
    // EDM / Dance
    [[10,2.3,4.9],[40,2.3,4.9],[160,1.0,2.9],[500,-4.3,2.1],[2000,-12.2,3.1],[6000,-20.3,4.9],[14000,-30.2,6.5],[20000,-30.2,6.5]],
    // Rock
    [[10,-12.5,16.9],[40,-12.5,16.9],[160,-5.1,9.7],[500,-15.0,4.8],[2000,-24.5,8.7],[6000,-39.3,14.4],[14000,-58.1,13.5],[20000,-58.1,13.5]],
    // Lo-Fi
    [[10,-13.8,7.9],[40,-13.8,7.9],[160,-3.4,3.8],[500,-10.5,2.9],[2000,-31.8,3.7],[6000,-44.0,4.9],[14000,-57.3,5.8],[20000,-57.3,5.8]],
    // R&B / Soul
    [[10,-3.8,8.1],[40,-3.8,8.1],[160,1.8,3.7],[500,-4.7,1.8],[2000,-17.5,3.1],[6000,-28.4,4.3],[14000,-40.0,5.6],[20000,-40.0,5.6]],
    // Latin
    [[10,-8.4,9.3],[40,-8.4,9.3],[160,-1.0,2.7],[500,-6.1,2.7],[2000,-17.3,2.4],[6000,-28.0,3.2],[14000,-36.8,6.0],[20000,-36.8,6.0]],
    // Trance
    [[10,0.8,5.1],[40,0.8,5.1],[160,2.9,3.1],[500,-6.6,2.5],[2000,-18.1,3.1],[6000,-28.4,4.6],[14000,-39.2,6.8],[20000,-39.2,6.8]],
    // Bass
    [[10,-1.4,9.7],[40,-1.4,9.7],[160,-3.7,3.9],[500,-7.8,2.8],[2000,-16.5,4.0],[6000,-25.2,5.1],[14000,-36.7,5.9],[20000,-36.7,5.9]],
    // House
    [[10,-3.9,6.8],[40,-3.9,6.8],[160,-3.2,4.2],[500,-14.3,3.7],[2000,-21.0,5.6],[6000,-26.3,7.1],[14000,-38.0,8.4],[20000,-38.0,8.4]],
    // Techno
    [[10,5.5,6.0],[40,5.5,6.0],[160,2.3,5.0],[500,-10.3,3.5],[2000,-22.1,4.1],[6000,-27.9,4.7],[14000,-39.0,5.5],[20000,-39.0,5.5]],
    // Downtempo
    [[10,-7.4,9.2],[40,-7.4,9.2],[160,-1.3,5.7],[500,-7.5,4.2],[2000,-22.1,4.4],[6000,-35.1,8.6],[14000,-48.4,10.8],[20000,-48.4,10.8]],
  ];

  var SPEC_BAND_MAX = 6.0; // max half-width in dB for target band display
  function interpKP(kp, f) {
    if (f <= kp[0][0]) { var hw0 = Math.min(kp[0][2], SPEC_BAND_MAX); return [kp[0][1]-hw0, kp[0][1]+hw0]; }
    if (f >= kp[kp.length-1][0]) { var l = kp[kp.length-1]; var hwL = Math.min(l[2], SPEC_BAND_MAX); return [l[1]-hwL, l[1]+hwL]; }
    for (var i = 1; i < kp.length; i++) {
      if (f <= kp[i][0]) {
        var t = (Math.log(f)-Math.log(kp[i-1][0]))/(Math.log(kp[i][0])-Math.log(kp[i-1][0]));
        var c = kp[i-1][1]+(kp[i][1]-kp[i-1][1])*t;
        var hw = Math.min(kp[i-1][2]+(kp[i][2]-kp[i-1][2])*t, SPEC_BAND_MAX);
        return [c-hw, c+hw];
      }

  // Pre-build metrics DOM once, update values each frame (no innerHTML thrashing)
  var metricDefs = [
    {key:'dynamics',    label:'Dynamics',    msgs:['Loudness on target.','Slightly off target.','Loudness mismatch.']},
    {key:'tonality',    label:'Tonality',    msgs:['Spectral balance good.','Tonal balance off.','Significant mismatch.']},
    {key:'width',       label:'Width',       msgs:['Width ideal.','Width off target.','Width mismatch.']},
    {key:'correlation', label:'Correlation', msgs:['Good mono compat.','Moderate compat.','Phase issues!']},
  ];
  var metricEls = null;

  function initMetrics() {
    var el = document.getElementById('metrics-container');
    el.innerHTML = '';
    metricEls = [];
    for (var di = 0; di < metricDefs.length; di++) {
      var def = metricDefs[di];
      var row = document.createElement('div');
      row.className = 'mrow';
      row.innerHTML = '<div class="mtop">' +
        '<span class="micon"></span>' +
        '<span class="mname">'+def.label+'</span>' +
        '<div class="mbarw"><div class="mbar"></div></div>' +
        '<span class="mpct"></span>' +
        '</div>' +
        '<div class="mmsg"></div>';
      el.appendChild(row);
      metricEls.push({
        icon: row.querySelector('.micon'),
        name: row.querySelector('.mname'),
        barW: row.querySelector('.mbarw'),
        bar:  row.querySelector('.mbar'),
        pct:  row.querySelector('.mpct'),
        msg:  row.querySelector('.mmsg'),
      });
    }
  }

  function renderMetrics() {
    if (!metricEls) initMetrics();
    var fs = fbScale;
    var iconSz = Math.round(9*fs)+'px', nameSz = Math.round(9*fs)+'px', pctSz = Math.round(9*fs)+'px';
    var msgSz = Math.round(8*fs)+'px', barH = Math.max(3,Math.round(3*fs))+'px';
    var nameW = Math.round(62*fs)+'px', padL = Math.round(17*fs)+'px', iconW = Math.round(12*fs)+'px';
    for (var di = 0; di < metricDefs.length; di++) {
      var def = metricDefs[di], s = fbScores[def.key], e = metricEls[di];
      var col = s > 75 ? 'rgba(0,220,120,0.88)' : s > 50 ? 'rgba(255,190,40,0.88)' : 'rgba(255,60,40,0.88)';
      var bc = s > 75 ? 'rgba(0,215,110,0.8)' : s > 50 ? 'rgba(255,185,35,0.8)' : 'rgba(255,55,35,0.8)';
      var ic = s > 75 ? '\u2713' : s > 50 ? '\u25B2' : '\u2715';
      var msg = s > 75 ? def.msgs[0] : s > 50 ? def.msgs[1] : def.msgs[2];
      e.icon.textContent = ic; e.icon.style.color = col; e.icon.style.fontSize = iconSz; e.icon.style.width = iconW;
      e.name.style.fontSize = nameSz; e.name.style.width = nameW;
      e.barW.style.height = barH;
      e.bar.style.width = s+'%'; e.bar.style.background = bc;
      e.pct.textContent = Math.round(s)+'%'; e.pct.style.color = col; e.pct.style.fontSize = pctSz;
      e.msg.textContent = msg; e.msg.style.fontSize = msgSz; e.msg.style.paddingLeft = padL;
    }
  }

  // ===== JUCE EVENT HANDLERS =====

  // Genre parameter: bidirectional binding
  var genreSelect = document.getElementById('main-genre');
  genreSelect.addEventListener('change', function(e) {
    genre = +e.target.value;
    if (genreState) genreState.setNormalisedValue(genre / 11);
  });

  if (genreState && genreState.valueChangedEvent) {
    genreState.valueChangedEvent.addListener(function() {
      var idx = Math.round(genreState.getNormalisedValue() * 11);
      genre = Math.max(0, Math.min(11, idx));
      genreSelect.value = genre;
    });
  }

  // Spectrum speed slider (UI-only, no DAW parameter)
  var speedSlider = document.getElementById('speed-sl');
  var speedVal = document.getElementById('speed-val');
  function updateSpeedLabel(val) {
    specSpeed = val / 100.0;
    if (val >= 95) speedVal.textContent = 'Instant';
    else if (val >= 70) speedVal.textContent = 'Fast';
    else if (val >= 40) speedVal.textContent = 'Medium';
    else if (val >= 15) speedVal.textContent = 'Slow';
    else speedVal.textContent = 'Hold';
  }
  speedSlider.addEventListener('input', function(e) {
    updateSpeedLabel(parseInt(e.target.value));
  });
  updateSpeedLabel(parseInt(speedSlider.value));

  // Shape/Level toggle
  var shapeToggleBtn = document.getElementById('shape-toggle');
  shapeToggleBtn.addEventListener('click', function() {
    shapeMode = !shapeMode;
    shapeToggleBtn.textContent = shapeMode ? 'SHAPE' : 'LEVEL';
    shapeToggleBtn.style.background = shapeMode ? 'rgba(0,212,255,0.15)' : 'rgba(255,255,255,0.06)';
    shapeToggleBtn.style.borderColor = shapeMode ? 'rgba(0,212,255,0.3)' : 'rgba(255,255,255,0.1)';
    shapeToggleBtn.style.color = shapeMode ? 'rgba(0,212,255,0.8)' : 'rgba(160,185,220,0.4)';
  });

  // Send button
  var sendBtn = document.getElementById('btn_send_snip');
  var statusLed = document.getElementById('status-led');
  var statusText = document.getElementById('status-text');

  sendBtn.addEventListener('click', function() {
    sendBtn.classList.add('sending');
    sendBtn.textContent = 'Sending...';
    statusLed.style.background = '#FFD600';
    statusLed.style.boxShadow = '0 0 6px rgba(255,214,0,0.6)';
    statusText.textContent = 'Sending to Meetsnip.com...';
    if (juceAvailable) {
      try { window.__JUCE__.backend.emitEvent("sendToSnip", {}); }
      catch(e) { /* fallback: simulate */ simulateSendResult(); }
    } else {
      simulateSendResult();
    }
  });

  function simulateSendResult() {
    setTimeout(function() {
      handleSendResult({success: true});
    }, 1500);
  }

  function handleSendResult(data) {
    if (data && data.success) {
      sendBtn.classList.remove('sending'); sendBtn.classList.add('sent'); sendBtn.textContent = 'Sent \u2713';
      statusLed.style.background = '#00e676'; statusLed.style.boxShadow = '0 0 6px rgba(0,230,118,0.6)';
      statusText.textContent = 'Analysis sent successfully';
      setTimeout(function() {
        sendBtn.classList.remove('sent'); sendBtn.textContent = 'Send to Meetsnip';
        statusText.textContent = 'Ready';
      }, 3000);
    } else {
      sendBtn.classList.remove('sending'); sendBtn.textContent = 'Send to Meetsnip';
      statusLed.style.background = '#FF1744'; statusLed.style.boxShadow = '0 0 6px rgba(255,23,68,0.6)';
      statusText.textContent = data && data.error ? 'Failed: ' + data.error : 'Send failed';
      setTimeout(function() {
        statusLed.style.background = '#00e676'; statusLed.style.boxShadow = '0 0 6px rgba(0,230,118,0.6)';
        statusText.textContent = 'Ready';
      }, 3000);
    }
  }

  // Listen for C++ events (guarded)
  if (juceAvailable && window.__JUCE__.backend) {
    try {
      window.__JUCE__.backend.addEventListener("sendResult", function(data) {
        handleSendResult(data);
      });

      window.__JUCE__.backend.addEventListener("analysisUpdate", function(d) {
        if (!d) return;
        hasReceivedData = true;

        if (d.lufsShort !== undefined) lufsT2 = d.lufsShort;
        if (d.lufsInt !== undefined) intV = d.lufsInt;
        if (d.rms !== undefined) rmsT2 = d.rms;
        if (d.correlation !== undefined) corrT = d.correlation;
        if (d.width !== undefined) widthT = d.width;

        if (d.spectrum && d.spectrum.length === N) {
          for (var si = 0; si < N; si++) specSig[si] = d.spectrum[si];
        }

        if (d.feedback) {
          if (d.feedback.dynamics !== undefined) fbTgts.dynamics = d.feedback.dynamics;
          if (d.feedback.tonality !== undefined) fbTgts.tonality = d.feedback.tonality;
          if (d.feedback.width !== undefined) fbTgts.width = d.feedback.width;
          if (d.feedback.correlation !== undefined) fbTgts.correlation = d.feedback.correlation;
        }

      });
    } catch(e) {
      console.warn("SNIP Bridge: Failed to set up JUCE event listeners:", e);
    }
  }

  // ===== SETUP & MAIN LOOP =====

  function updateFbScale() {
    var fb = document.getElementById('fb-panel');
    if (!fb) return;
    var h = fb.offsetHeight, w = fb.offsetWidth;
    fbScale = Math.min(h / 120, w / 300);
    fbScale = Math.max(0.5, Math.min(2.5, fbScale));
    // Scale padding based on available height
    var pad = Math.max(4, Math.round(10 * fbScale));
    fb.style.padding = pad + 'px ' + Math.round(14 * Math.min(1, fbScale)) + 'px';
    fb.style.gap = Math.max(4, Math.round(10 * fbScale)) + 'px';
    // Constrain arc to available content height (panel height minus padding)
    var contentH = h - pad * 2;
    var arcSz = Math.round(80 * fbScale);
    // Arc + score (~14px) + label (~7px) + gaps must fit in contentH
    var maxArc = Math.max(20, contentH - Math.round(24 * fbScale));
    arcSz = Math.min(arcSz, maxArc);
    fbArcCv.width = arcSz; fbArcCv.height = arcSz;
    fbArcCv.style.width = arcSz + 'px'; fbArcCv.style.height = arcSz + 'px';
    // Scale score text
    var scoreEl = document.getElementById('fb-score');
    if (scoreEl) scoreEl.style.fontSize = Math.round(20 * fbScale) + 'px';
    // Scale/hide match label at tiny sizes
    var matchLbl = fb.querySelector('.fb-match-lbl');
    if (matchLbl) {
      if (contentH < 50) { matchLbl.style.display = 'none'; }
      else { matchLbl.style.display = ''; matchLbl.style.fontSize = Math.round(7 * fbScale) + 'px'; }
    }
    // Hide score text at very tiny sizes
    if (scoreEl) { scoreEl.style.display = contentH < 35 ? 'none' : ''; }
  }

  function setupAll() {
    setupSpec(); setupVS();
    updateFbScale();
  }

  var setupRetries = 0;
  function trySetup() {
    setupAll();
    setupRetries++;
    if ((!specCv.offsetWidth || !specCv.offsetHeight) && setupRetries < 20) {
      setTimeout(trySetup, 100);
    }
  }

  setTimeout(trySetup, 60);
  window.addEventListener('resize', function() { setTimeout(setupAll, 30); });

  function tick() {
    if (genre !== lastGenre) { buildSpecTargets(); lastGenre = genre; }

    // Smooth spectrum toward signal (temporal) — specSpeed: 0=frozen, 1=instant
    var alpha = specSpeed;
    for (var ti = 0; ti < N; ti++) {
      specSmth[ti] += (specSig[ti]-specSmth[ti]) * alpha;
    }
    drawSpec();

    // Dynamics: smooth toward targets
    lufsV += (lufsT2-lufsV)*.15;
    rmsV += (rmsT2-rmsV)*.15;
    if (lufsV > lufsPk) { lufsPk = lufsV; lufsPkT = 80; }
    else if (--lufsPkT <= 0) lufsPk -= .05;
    if (rmsV > rmsPk) { rmsPk = rmsV; rmsPkT = 80; }
    else if (--rmsPkT <= 0) rmsPk -= .05;

    var tgt = genreData[genre];
    var inL = lufsV >= tgt.lufsLo && lufsV <= tgt.lufsHi;
    var inR = rmsV >= tgt.rmsLo && rmsV <= tgt.rmsHi;

    /* ── LUFS readouts ── */
    if (lufsV > lufsMomMax && lufsV > -55) lufsMomMax = lufsV;
    var lrS = document.getElementById('lr-short');
    var lrI = document.getElementById('lr-int');
    var lrP = document.getElementById('lr-peak');
    var lrR = document.getElementById('lr-rms');
    lrS.textContent = lufsV > -55 ? lufsV.toFixed(1) : '---';
    lrS.style.color = lufsV <= -55 ? '#555' : inL ? '#00e090' : lufsV > tgt.lufsHi ? '#ff4422' : '#ffd020';
    lrI.textContent = intV > -55 ? intV.toFixed(1) : '---';
    lrI.style.color = intV <= -55 ? '#555' : '#E91E8C';
    lrP.textContent = lufsMomMax > -55 ? lufsMomMax.toFixed(1) : '---';
    lrP.style.color = lufsMomMax <= -55 ? '#555' : lufsMomMax > tgt.lufsHi ? '#ff4422' : '#00e090';
    lrR.textContent = rmsV > -55 ? rmsV.toFixed(1) : '---';
    lrR.style.color = rmsV <= -55 ? '#555' : inR ? '#00e090' : rmsV > tgt.rmsHi ? '#ff4422' : '#00d4ff';
    // Stereo: smooth toward targets
    corrV += (corrT-corrV)*.05;
    widthV += (widthT-widthV)*.05;
    drawVS();
    document.getElementById('corr-val').textContent = hasReceivedData ? corrV.toFixed(2) : '---';
    document.getElementById('width-val').textContent = hasReceivedData ? Math.round(widthV*100)+'%' : '---';
    var hw = (widthV*.5)*48;
    document.getElementById('wbar-l').style.width = hw+'%';
    document.getElementById('wbar-r').style.width = hw+'%';
    document.getElementById('wbar-tgt').style.left = ((0.5-tgt.whi/2)*100)+'%';
    document.getElementById('wbar-tgt').style.width = ((tgt.whi-tgt.wlo)*100)+'%';

    // Feedback: smooth scores
    var keys = ['dynamics','tonality','width','correlation'];
    for (var ki = 0; ki < keys.length; ki++) {
      fbScores[keys[ki]] += (fbTgts[keys[ki]]-fbScores[keys[ki]])*.04;
    }
    var overall = Math.round((fbScores.dynamics+fbScores.tonality+fbScores.width+fbScores.correlation)/4);
    fbSmooth += (overall-fbSmooth)*.04;
    var sc = Math.round(fbSmooth), arcCol = drawFbArc(fbSmooth);
    var fbScoreEl = document.getElementById('fb-score');
    fbScoreEl.textContent = hasReceivedData ? sc : '--';
    fbScoreEl.style.color = arcCol;
    fbScoreEl.style.fontSize = Math.round(20 * fbScale) + 'px';
    var genreNameEl = document.getElementById('genre-name');
    genreNameEl.textContent = genreNames[genre];
    genreNameEl.style.fontSize = Math.round(11 * fbScale) + 'px';
    renderMetrics();

    requestAnimationFrame(tick);
  }

  // ===== RESIZABLE SPLITTERS =====
  var splitV = document.getElementById('split-v');
  var splitH1 = document.getElementById('split-h1');
  var splitH2 = document.getElementById('split-h2');
  var bodyEl = document.querySelector('.body');
  var specPanel = document.getElementById('spec-panel');
  var rightPanel = document.getElementById('right-panel');
  var vsPanelEl = document.getElementById('vs-panel');
  var metersPanelEl = document.getElementById('meters-panel');
  var fbPanelEl = document.getElementById('fb-panel');
  var draggingSplit = null;
  var rafPending = false;

  function startDrag(e) {
    e.preventDefault();
    draggingSplit = e.currentTarget.id;
    e.currentTarget.classList.add('dragging');
    document.body.style.cursor = draggingSplit === 'split-v' ? 'col-resize' : 'row-resize';
    document.body.style.userSelect = 'none';
    document.body.style.webkitUserSelect = 'none';
  }

  splitV.addEventListener('mousedown', startDrag);
  splitH1.addEventListener('mousedown', startDrag);
  splitH2.addEventListener('mousedown', startDrag);

  document.addEventListener('mousemove', function(e) {
    if (!draggingSplit) return;
    if (rafPending) return;
    rafPending = true;
    requestAnimationFrame(function() {
      rafPending = false;
      if (!draggingSplit) return;
      if (draggingSplit === 'split-v') {
        var rect = bodyEl.getBoundingClientRect();
        var totalW = rect.width;
        var pct = ((e.clientX - rect.left) / totalW) * 100;
        var minPct = Math.max(15, (120 / totalW) * 100);
        var maxPct = Math.min(85, ((totalW - 125) / totalW) * 100);
        pct = Math.max(minPct, Math.min(maxPct, pct));
        specPanel.style.width = pct + '%';
      } else if (draggingSplit === 'split-h1') {
        // Between vectorscope and meters
        var rect = rightPanel.getBoundingClientRect();
        var y = e.clientY - rect.top;
        y = Math.max(60, Math.min(rect.height - 135, y));
        vsPanelEl.style.flex = 'none';
        vsPanelEl.style.height = y + 'px';
      } else if (draggingSplit === 'split-h2') {
        // Between meters and feedback
        var rect = rightPanel.getBoundingClientRect();
        var fbH = rect.height - (e.clientY - rect.top);
        fbH = Math.max(60, Math.min(rect.height - 135, fbH));
        fbPanelEl.style.flex = 'none';
        fbPanelEl.style.height = fbH + 'px';
      }
      setupAll();
    });
  });

  document.addEventListener('mouseup', function() {
    if (!draggingSplit) return;
    var el = document.getElementById(draggingSplit);
    if (el) el.classList.remove('dragging');
    draggingSplit = null;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    document.body.style.webkitUserSelect = '';
    setupAll();
  });

  setTimeout(tick, 120);
})();
</script>
</body>
</html>
